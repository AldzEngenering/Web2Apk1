name: Build APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      package_name:
        description: 'Package Name'
        required: true
        type: string
      url:
        description: 'Website URL'
        required: false
        type: string
      zip_url:
        description: 'ZIP URL (Flutter Project)'
        required: false
        type: string
      user_id:
        description: 'User ID'
        required: true
        type: string
      build_mode:
        description: 'Build Mode (debug/release)'
        required: false
        default: 'release'
        type: string
      icon_url:
        description: 'Icon URL'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Flutter Project
        run: |
          flutter create --org $(echo "${{ inputs.package_name }}" | cut -d. -f1,2) \
            --project-name $(echo "${{ inputs.app_name }}" | tr ' ' '_' | tr '[:upper:]' '[:lower:]') \
            app
          cd app
          
          # Update package name
          sed -i "s/com.example.app/${{ inputs.package_name }}/g" android/app/build.gradle
          sed -i "s/com.example.app/${{ inputs.package_name }}/g" android/app/src/main/AndroidManifest.xml
          sed -i "s/package=\"com.example.app\"/package=\"${{ inputs.package_name }}\"/g" android/app/src/main/AndroidManifest.xml
          
          # Update app name
          sed -i "s/MyApp/${{ inputs.app_name }}/g" android/app/src/main/AndroidManifest.xml

      - name: Download Website (if URL provided)
        if: inputs.url != ''
        run: |
          cd app/lib
          # Download website content
          curl -L "${{ inputs.url }}" -o index.html
          # Create main.dart with webview
          cat > main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          
          void main() => runApp(const MyApp());
          
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ inputs.app_name }}',
                theme: ThemeData(primarySwatch: Colors.blue),
                home: const WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }
          
          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});
            
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }
          
          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;
            
            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..loadRequest(Uri.parse('${{ inputs.url }}'));
            }
            
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text('${{ inputs.app_name }}'),
                  backgroundColor: Colors.blue,
                  foregroundColor: Colors.white,
                ),
                body: WebViewWidget(controller: controller),
              );
            }
          }
          EOF
          
          # Update pubspec.yaml
          cd ..
          echo "  webview_flutter: ^4.4.2" >> pubspec.yaml

      - name: Download ZIP (if ZIP URL provided)
        if: inputs.zip_url != ''
        run: |
          curl -L "${{ inputs.zip_url }}" -o project.zip
          unzip -o project.zip -d temp_project
          # Copy files to app folder
          cp -r temp_project/* app/ || true
          cp -r temp_project/.??* app/ || true

      - name: Download Icon (if URL provided)
        if: inputs.icon_url != ''
        run: |
          cd app/android/app/src/main/res
          mkdir -p mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi
          curl -L "${{ inputs.icon_url }}" -o icon.png
          
          # Resize icons
          convert icon.png -resize 72x72 mipmap-hdpi/ic_launcher.png
          convert icon.png -resize 48x48 mipmap-mdpi/ic_launcher.png
          convert icon.png -resize 96x96 mipmap-xhdpi/ic_launcher.png
          convert icon.png -resize 144x144 mipmap-xxhdpi/ic_launcher.png
          convert icon.png -resize 192x192 mipmap-xxxhdpi/ic_launcher.png

      - name: Add Dependencies
        run: |
          cd app
          flutter pub add webview_flutter
          flutter pub add http

      - name: Build APK
        run: |
          cd app
          if [ "${{ inputs.build_mode }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-builds
          path: app/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
