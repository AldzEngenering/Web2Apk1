name: Build APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      package_name:
        description: 'Package Name'
        required: true
        type: string
      url:
        description: 'Website URL'
        required: false
        type: string
      zip_url:
        description: 'ZIP URL (Flutter Project)'
        required: false
        type: string
      user_id:
        description: 'User ID'
        required: true
        type: string
      build_mode:
        description: 'Build Mode (debug/release)'
        required: false
        default: 'release'
        type: string
      icon_url:
        description: 'Icon URL'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # ============ STEP 1: CHECKOUT ============
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      # ============ STEP 2: SETUP FLUTTER ============
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true

      # ============ STEP 3: SETUP JAVA ============
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      # ============ STEP 4: SETUP ANDROID SDK ============
      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools" >> $GITHUB_ENV
          echo "✅ Android SDK configured"

      # ============ STEP 5: CREATE FLUTTER PROJECT ============
      - name: Create Flutter Project
        id: create_project
        run: |
          # Clean app name (remove special chars)
          APP_NAME=$(echo "${{ inputs.app_name }}" | tr ' ' '_' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]//g')
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          
          echo "📱 Creating Flutter project: $APP_NAME"
          echo "📦 Package: ${{ inputs.package_name }}"
          
          # Create Flutter project
          flutter create \
            --org $(echo "${{ inputs.package_name }}" | cut -d. -f1,2) \
            --project-name $APP_NAME \
            --platforms android \
            app || exit 1
          
          cd app || exit 1
          
          # ===== UPDATE PACKAGE NAME =====
          echo "📝 Updating package name to: ${{ inputs.package_name }}"
          
          # Update all gradle files
          find . -type f -name "*.gradle" -exec sed -i "s/com.example.app/${{ inputs.package_name }}/g" {} \;
          find . -type f -name "*.gradle.kts" -exec sed -i "s/com.example.app/${{ inputs.package_name }}/g" {} \;
          
          # Update AndroidManifest.xml
          find . -type f -name "AndroidManifest.xml" -exec sed -i "s/com.example.app/${{ inputs.package_name }}/g" {} \;
          find . -type f -name "AndroidManifest.xml" -exec sed -i "s/MyApp/${{ inputs.app_name }}/g" {} \;
          
          # Update kotlin/java files
          find . -type f -name "*.kt" -exec sed -i "s/com.example.app/${{ inputs.package_name }}/g" {} \;
          find . -type f -name "*.java" -exec sed -i "s/com.example.app/${{ inputs.package_name }}/g" {} \;
          
          # Update build.gradle app name
          sed -i "s/applicationId \".*\"/applicationId \"${{ inputs.package_name }}\"/g" android/app/build.gradle
          
          echo "✅ Flutter project created successfully"

      # ============ STEP 6: SETUP WEBVIEW ============
      - name: Setup WebView for URL
        if: inputs.url != '' && inputs.url != 'null'
        run: |
          cd app || exit 1
          
          echo "🌐 Setting up WebView for: ${{ inputs.url }}"
          
          # Add webview_flutter dependency
          flutter pub add webview_flutter || {
            echo "⚠️ webview_flutter add failed, trying alternative method..."
            flutter pub get || exit 1
          }
          
          # Create main.dart with WebView
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          
          void main() => runApp(const MyApp());
          
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ inputs.app_name }}',
                theme: ThemeData(
                  primarySwatch: Colors.blue,
                  useMaterial3: true,
                ),
                home: const WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }
          
          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});
            
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }
          
          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;
            
            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0x00000000))
                ..loadRequest(Uri.parse('${{ inputs.url }}'));
            }
            
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text('${{ inputs.app_name }}'),
                  backgroundColor: Colors.blue,
                  foregroundColor: Colors.white,
                  elevation: 0,
                ),
                body: WebViewWidget(controller: controller),
              );
            }
          }
          EOF
          
          echo "✅ WebView setup complete"

      # ============ STEP 7: DOWNLOAD ZIP ============
      - name: Download ZIP Project
        if: inputs.zip_url != '' && inputs.zip_url != 'null'
        run: |
          echo "📦 Downloading ZIP from: ${{ inputs.zip_url }}"
          
          # Download ZIP
          curl -L --max-time 60 "${{ inputs.zip_url }}" -o project.zip || exit 1
          
          # Extract ZIP
          mkdir -p temp_project
          unzip -o project.zip -d temp_project/ || exit 1
          
          # Find project root (look for pubspec.yaml)
          PROJECT_ROOT=$(find temp_project -name "pubspec.yaml" -type f -printf "%h\n" | head -1)
          
          if [ -z "$PROJECT_ROOT" ]; then
            echo "❌ pubspec.yaml not found in ZIP!"
            exit 1
          fi
          
          echo "📁 Project root found: $PROJECT_ROOT"
          
          # Copy files to app directory
          cd app || exit 1
          rm -rf lib android pubspec.yaml || true
          cp -rf ../$PROJECT_ROOT/* . 2>/dev/null || true
          cp -rf ../$PROJECT_ROOT/.* . 2>/dev/null || true
          
          # Clean up
          cd ..
          rm -rf temp_project project.zip
          
          echo "✅ ZIP extracted successfully"

      # ============ STEP 8: DOWNLOAD ICON ============
      - name: Download Icon
        if: inputs.icon_url != '' && inputs.icon_url != 'null'
        run: |
          echo "🖼️ Downloading icon from: ${{ inputs.icon_url }}"
          
          # Install ImageMagick
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
          
          # Download icon
          curl -L --max-time 30 "${{ inputs.icon_url }}" -o icon.png || exit 1
          
          # Create icon directories
          cd app/android/app/src/main/res || exit 1
          
          mkdir -p mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi
          
          # Resize icons
          convert ../../../../../icon.png -resize 72x72 mipmap-hdpi/ic_launcher.png 2>/dev/null || echo "⚠️ Icon resize warning"
          convert ../../../../../icon.png -resize 48x48 mipmap-mdpi/ic_launcher.png 2>/dev/null || echo "⚠️ Icon resize warning"
          convert ../../../../../icon.png -resize 96x96 mipmap-xhdpi/ic_launcher.png 2>/dev/null || echo "⚠️ Icon resize warning"
          convert ../../../../../icon.png -resize 144x144 mipmap-xxhdpi/ic_launcher.png 2>/dev/null || echo "⚠️ Icon resize warning"
          convert ../../../../../icon.png -resize 192x192 mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || echo "⚠️ Icon resize warning"
          
          # Copy for round icons
          cp mipmap-hdpi/ic_launcher.png mipmap-hdpi/ic_launcher_round.png 2>/dev/null || true
          cp mipmap-mdpi/ic_launcher.png mipmap-mdpi/ic_launcher_round.png 2>/dev/null || true
          cp mipmap-xhdpi/ic_launcher.png mipmap-xhdpi/ic_launcher_round.png 2>/dev/null || true
          cp mipmap-xxhdpi/ic_launcher.png mipmap-xxhdpi/ic_launcher_round.png 2>/dev/null || true
          cp mipmap-xxxhdpi/ic_launcher.png mipmap-xxxhdpi/ic_launcher_round.png 2>/dev/null || true
          
          cd ../../../..
          echo "✅ Icon setup complete"

      # ============ STEP 9: INSTALL DEPENDENCIES ============
      - name: Install Dependencies
        id: install_deps
        run: |
          cd app || exit 1
          
          echo "📦 Installing Flutter dependencies..."
          
          # Clean
          flutter clean || true
          
          # Get packages
          flutter pub get || {
            echo "❌ flutter pub get failed!"
            echo "📄 Checking pubspec.yaml:"
            cat pubspec.yaml || true
            exit 1
          }
          
          echo "✅ Dependencies installed successfully"

      # ============ STEP 10: BUILD APK ============
      - name: Build APK
        id: build_apk
        run: |
          cd app || exit 1
          
          echo "🔨 Building APK in ${{ inputs.build_mode }} mode..."
          
          # Build
          if [ "${{ inputs.build_mode }}" = "debug" ]; then
            flutter build apk --debug || exit 1
          else
            flutter build apk --release || exit 1
          fi
          
          # Verify APK exists
          echo "📂 Checking APK files:"
          ls -la build/app/outputs/flutter-apk/ || true
          
          # Find APK
          if [ -f "build/app/outputs/flutter-apk/app-${{ inputs.build_mode }}.apk" ]; then
            echo "APK_PATH=build/app/outputs/flutter-apk/app-${{ inputs.build_mode }}.apk" >> $GITHUB_ENV
            echo "✅ APK found: app-${{ inputs.build_mode }}.apk"
          elif [ -f "build/app/outputs/flutter-apk/app.apk" ]; then
            echo "APK_PATH=build/app/outputs/flutter-apk/app.apk" >> $GITHUB_ENV
            echo "✅ APK found: app.apk"
          else
            echo "❌ APK not found!"
            find build -name "*.apk" -type f || true
            exit 1
          fi

      # ============ STEP 11: UPLOAD APK ============
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-builds
          path: app/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
          compression-level: 0
          if-no-files-found: error

      # ============ STEP 12: SUCCESS NOTIFICATION ============
      - name: Build Success
        if: success()
        run: |
          echo "✅ Build successful!"
          echo "📱 App: ${{ inputs.app_name }}"
          echo "📦 Package: ${{ inputs.package_name }}"
          echo "🔧 Mode: ${{ inputs.build_mode }}"
          echo "👤 User: ${{ inputs.user_id }}"

      # ============ STEP 13: FAILURE NOTIFICATION ============
      - name: Build Failure
        if: failure()
        run: |
          echo "❌ Build failed!"
          echo "📱 App: ${{ inputs.app_name }}"
          echo "👤 User: ${{ inputs.user_id }}"
          echo "🔍 Check logs above for details"
