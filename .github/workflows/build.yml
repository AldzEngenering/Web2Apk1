name: Web2APK Builder

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: false
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      package_name:
        description: 'Package Name'
        required: true
        type: string
      user_id:
        description: 'Telegram User ID'
        required: true
        type: string
      zip_url:
        description: 'URL ZIP Flutter Project'
        required: false
        type: string
      job_id:
        description: 'Job ID'
        required: false
        type: string
      icon_data:
        description: 'Base64 Icon Data'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    
    # This is the most important fix - use bash shell explicitly
    defaults:
      run:
        shell: bash

    steps:
      # CRITICAL: This step MUST be first
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup environment first
      - name: Setup environment
        run: |
          echo "Setting up environment..."
          mkdir -p ~/.android
          
          # Pre-accept Android licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.android/licenses/android-sdk-preview-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > ~/.android/licenses/intel-android-extra-license
          echo "✅ Environment ready"

      # Setup Java - SIMPLIFIED
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Setup Android SDK - SIMPLIFIED
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
          accept-android-sdk-licenses: true

      # Setup Flutter - SIMPLIFIED
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.4'
          channel: 'stable'
          cache: true

      # Install system dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget unzip git

      # Validate inputs
      - name: Validate inputs
        id: validate
        run: |
          if [ -z "${{ inputs.url }}" ] && [ -z "${{ inputs.zip_url }}" ]; then
            echo "❌ URL or ZIP URL required"
            exit 1
          fi
          echo "✅ Inputs valid"

      # Process icon if provided
      - name: Process icon
        id: icon
        if: ${{ inputs.icon_data != '' }}
        run: |
          echo "${{ inputs.icon_data }}" | base64 -d > icon.png 2>/dev/null || echo "No icon"
          if [ -f icon.png ]; then
            echo "icon_available=true" >> $GITHUB_OUTPUT
          else
            echo "icon_available=false" >> $GITHUB_OUTPUT
          fi

      # Build from URL
      - name: Build from URL
        if: ${{ inputs.url != '' }}
        run: |
          APP_NAME="${{ inputs.app_name }}"
          APP_URL="${{ inputs.url }}"
          PACKAGE_NAME="${{ inputs.package_name }}"
          
          echo "Building app: $APP_NAME"
          
          # Create project
          flutter create --org com.web2apk --project-name webapp webapp
          cd webapp
          
          # Update pubspec
          cat > pubspec.yaml << 'EOF'
          name: webapp
          description: WebView app
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.7.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF
          
          # Create main.dart
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'APP_NAME',
                theme: ThemeData.dark(),
                home: const WebViewPage(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class WebViewPage extends StatefulWidget {
            const WebViewPage({super.key});

            @override
            State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> {
            late final WebViewController controller;

            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..loadRequest(Uri.parse('APP_URL'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: WebViewWidget(controller: controller),
              );
            }
          }
          EOF
          
          # Replace placeholders
          sed -i "s/APP_NAME/$APP_NAME/g" lib/main.dart
          sed -i "s#APP_URL#$APP_URL#g" lib/main.dart
          
          # Update Android manifest
          sed -i "s/package=\".*\"/package=\"$PACKAGE_NAME\"/" android/app/src/main/AndroidManifest.xml
          sed -i "s/android:label=\".*\"/android:label=\"$APP_NAME\"/" android/app/src/main/AndroidManifest.xml
          
          # Add internet permission
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          
          # Update build.gradle
          sed -i "s/applicationId \".*\"/applicationId \"$PACKAGE_NAME\"/" android/app/build.gradle
          sed -i "s/minSdkVersion .*/minSdkVersion 21/" android/app/build.gradle
          sed -i "s/targetSdkVersion .*/targetSdkVersion 34/" android/app/build.gradle
          
          # Copy icon if available
          if [ "${{ steps.icon.outputs.icon_available }}" = "true" ]; then
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            
            cp ../icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp ../icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp ../icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp ../icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp ../icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          fi
          
          # Build
          flutter pub get
          flutter build apk --release
          
          echo "✅ Build complete"

      # Build from ZIP
      - name: Build from ZIP
        if: ${{ inputs.zip_url != '' }}
        run: |
          APP_NAME="${{ inputs.app_name }}"
          PACKAGE_NAME="${{ inputs.package_name }}"
          ZIP_URL="${{ inputs.zip_url }}"
          
          echo "Building from ZIP..."
          
          # Download and extract
          wget -O project.zip "$ZIP_URL"
          unzip -q project.zip -d project
          
          # Find project
          PROJECT_DIR=$(find project -name "pubspec.yaml" -exec dirname {} \; | head -1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "❌ Project not found"
            exit 1
          fi
          
          cd "$PROJECT_DIR"
          
          # Clean
          rm -rf build .dart_tool
          
          # Add webview if missing
          if ! grep -q webview_flutter pubspec.yaml; then
            sed -i '/dependencies:/a\  webview_flutter: ^4.7.0' pubspec.yaml
          fi
          
          # Update package name
          sed -i "s/applicationId \".*\"/applicationId \"$PACKAGE_NAME\"/" android/app/build.gradle
          sed -i "s/package=\".*\"/package=\"$PACKAGE_NAME\"/" android/app/src/main/AndroidManifest.xml
          sed -i "s/android:label=\".*\"/android:label=\"$APP_NAME\"/" android/app/src/main/AndroidManifest.xml
          
          # Copy icon if available
          if [ "${{ steps.icon.outputs.icon_available }}" = "true" ]; then
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            
            cp ../../icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png 2>/dev/null || true
            cp ../../icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null || true
            cp ../../icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png 2>/dev/null || true
            cp ../../icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png 2>/dev/null || true
            cp ../../icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || true
          fi
          
          # Build
          flutter pub get
          flutter build apk --release
          
          echo "✅ Build complete"

      # Find APK
      - name: Find APK
        id: find_apk
        run: |
          APK=$(find . -name "*.apk" -path "*/build/app/outputs/*" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK not found"
            exit 1
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "✅ Found APK: $APK"

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-${{ inputs.job_id }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7

      # Get APK info
      - name: APK info
        id: apk_info
        if: success()
        run: |
          APK="${{ steps.find_apk.outputs.apk_path }}"
          SIZE=$(du -h "$APK" | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "📊 APK Size: $SIZE"

      # Send to Telegram
      - name: Send to Telegram
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ inputs.user_id }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *Build Berhasil!*
            
            📱 Nama: ${{ inputs.app_name }}
            📦 Package: ${{ inputs.package_name }}
            📊 Size: ${{ steps.apk_info.outputs.size }}
            🆔 Job: ${{ inputs.job_id }}
          document: ${{ steps.find_apk.outputs.apk_path }}

      # Send failure notification
      - name: Failure notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *Build Gagal!*
            
            📱 Nama: ${{ inputs.app_name }}
            👤 User: ${{ inputs.user_id }}
            🆔 Job: ${{ inputs.job_id }}
