# .github/workflows/flutter_build.yml
name: 🚀 Flutter APK Builder

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '🏷️ Release Tag'
        required: true
        type: string
      build_type:
        description: '🔧 Tipe Build'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
      release_url:
        description: '📦 URL Release (ZIP Project)'
        required: true
        type: string

env:
  FLUTTER_VERSION: '3.24.3'
  JAVA_VERSION: '17'
  ANDROID_SDK_VERSION: '34.0.0'
  GRADLE_VERSION: '8.3'

jobs:
  build:
    name: 🔨 Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      # ═══════════════════════════════════════════════════════════════════
      # 1. CHECKOUT
      # ═══════════════════════════════════════════════════════════════════
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ═══════════════════════════════════════════════════════════════════
      # 2. INSTALL SYSTEM DEPENDENCIES
      # ═══════════════════════════════════════════════════════════════════
      - name: 📦 Install System Dependencies
        run: |
          echo "📦 Installing system dependencies..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl \
            git \
            unzip \
            xz-utils \
            zip \
            libglu1-mesa \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev \
            clang \
            cmake \
            build-essential \
            wget \
            ca-certificates \
            gnupg \
            lsb-release
          echo "✅ System dependencies installed"

      # ═══════════════════════════════════════════════════════════════════
      # 3. SETUP JAVA
      # ═══════════════════════════════════════════════════════════════════
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # ═══════════════════════════════════════════════════════════════════
      # 4. SETUP ANDROID SDK
      # ═══════════════════════════════════════════════════════════════════
      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: ${{ env.ANDROID_SDK_VERSION }}

      - name: 📱 Accept Android Licenses
        run: |
          echo "📱 Accepting Android SDK licenses..."
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          echo "✅ Android licenses accepted"

      - name: 📱 Install Android Build Tools
        run: |
          echo "📱 Installing Android build tools..."
          sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34" > /dev/null 2>&1 || true
          echo "✅ Android build tools installed"

      # ═══════════════════════════════════════════════════════════════════
      # 5. SETUP FLUTTER
      # ═══════════════════════════════════════════════════════════════════
      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: ✅ Verify Flutter Installation
        run: |
          echo "🔍 Verifying Flutter..."
          flutter --version
          
          if ! command -v flutter &> /dev/null; then
            echo "❌ Flutter not found in PATH!"
            exit 1
          fi
          
          echo "✅ Flutter installed successfully"

      - name: 🩺 Flutter Doctor
        run: |
          echo "🩺 Running Flutter Doctor..."
          flutter doctor -v || true
          echo "✅ Flutter Doctor completed"

      # ═══════════════════════════════════════════════════════════════════
      # 6. DOWNLOAD PROJECT ZIP
      # ═══════════════════════════════════════════════════════════════════
      - name: 📦 Download Project ZIP
        run: |
          echo "📦 Downloading project from release..."
          
          # Download dengan retry
          for i in 1 2 3; do
            echo "🔄 Attempt $i..."
            curl -L -o project.zip \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "${{ github.event.inputs.release_url }}" && break
            sleep 3
          done
          
          if [ ! -f project.zip ]; then
            echo "❌ Failed to download project.zip"
            exit 1
          fi
          
          FILE_SIZE=$(du -h project.zip | cut -f1)
          echo "✅ Project downloaded: $FILE_SIZE"

      # ═══════════════════════════════════════════════════════════════════
      # 7. EXTRACT PROJECT
      # ═══════════════════════════════════════════════════════════════════
      - name: 📂 Extract Project
        run: |
          echo "📂 Extracting project..."
          mkdir -p project
          
          # Unzip dengan retry
          if ! unzip -q project.zip -d project/; then
            echo "⚠️ Unzip failed, trying with -o..."
            unzip -o -q project.zip -d project/
          fi
          
          rm -f project.zip
          
          echo "📂 Project contents:"
          ls -la project/ | head -20
          
          # Validate project
          if [ ! -f project/pubspec.yaml ]; then
            echo "❌ pubspec.yaml not found!"
            echo "📂 Looking for pubspec.yaml..."
            find project -name "pubspec.yaml" -type f | head -5
            exit 1
          fi
          
          echo "✅ Project extracted successfully"

      # ═══════════════════════════════════════════════════════════════════
      # 8. VALIDATE PROJECT STRUCTURE
      # ═══════════════════════════════════════════════════════════════════
      - name: ✅ Validate Project
        run: |
          echo "🔍 Validating project structure..."
          
          cd project
          
          # Check pubspec.yaml
          if [ ! -f pubspec.yaml ]; then
            echo "❌ pubspec.yaml not found!"
            exit 1
          fi
          
          # Check main.dart
          if [ ! -f lib/main.dart ]; then
            echo "⚠️ lib/main.dart not found, but continuing..."
          fi
          
          # Check android folder
          if [ ! -d android ]; then
            echo "❌ android/ folder not found!"
            echo "📂 This might not be a Flutter project"
            exit 1
          fi
          
          echo "✅ Project validation passed"

      # ═══════════════════════════════════════════════════════════════════
      # 9. FLUTTER CLEAN
      # ═══════════════════════════════════════════════════════════════════
      - name: 🧹 Flutter Clean
        working-directory: ./project
        run: |
          echo "🧹 Running flutter clean..."
          flutter clean || true
          echo "✅ Flutter clean completed"

      # ═══════════════════════════════════════════════════════════════════
      # 10. FLUTTER PUB GET
      # ═══════════════════════════════════════════════════════════════════
      - name: 📦 Flutter Pub Get
        working-directory: ./project
        run: |
          echo "📦 Running flutter pub get..."
          
          # Run with retry
          for i in 1 2 3; do
            echo "🔄 Attempt $i..."
            if flutter pub get; then
              echo "✅ flutter pub get succeeded"
              break
            fi
            sleep 5
          done
          
          if [ $? -ne 0 ]; then
            echo "❌ flutter pub get failed after 3 attempts!"
            echo "📋 Checking pubspec.yaml..."
            cat pubspec.yaml || true
            exit 1
          fi
          
          echo "✅ Dependencies installed"

      # ═══════════════════════════════════════════════════════════════════
      # 11. BUILD APK
      # ═══════════════════════════════════════════════════════════════════
      - name: 🔨 Build APK (${{ github.event.inputs.build_type }})
        working-directory: ./project
        run: |
          echo "🔨 Building APK (${{ github.event.inputs.build_type }})..."
          
          BUILD_CMD="flutter build apk --${{ github.event.inputs.build_type }}"
          
          # Add split-per-abi for release
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            BUILD_CMD="$BUILD_CMD --split-per-abi"
          fi
          
          echo "📋 Command: $BUILD_CMD"
          
          # Build with retry
          for i in 1 2; do
            echo "🔄 Build attempt $i..."
            if eval $BUILD_CMD; then
              echo "✅ Build succeeded!"
              break
            fi
            flutter clean || true
            sleep 5
          done
          
          if [ $? -ne 0 ]; then
            echo "❌ Build failed!"
            exit 1
          fi

      # ═══════════════════════════════════════════════════════════════════
      # 12. COLLECT APK FILES
      # ═══════════════════════════════════════════════════════════════════
      - name: 📦 Collect APK Files
        run: |
          echo "📦 Collecting APK files..."
          mkdir -p apk_output
          
          # Find all APK files
          find project/build -name "*.apk" -exec cp {} apk_output/ \; 2>/dev/null || true
          
          # If no APK found, check alternative paths
          if [ -z "$(ls -A apk_output 2>/dev/null)" ]; then
            echo "⚠️ No APK found in build directory!"
            echo "📋 Searching for APK files..."
            find project -name "*.apk" -type f 2>/dev/null || echo "No APK found!"
            
            # Check flutter build output
            if [ -d "project/build/app/outputs/flutter-apk" ]; then
              echo "📋 Checking flutter-apk directory..."
              ls -la project/build/app/outputs/flutter-apk/ || true
            fi
            
            # Create dummy file to avoid artifact error
            echo "No APK generated" > apk_output/README.txt
          else
            echo "📦 APK files found:"
            ls -la apk_output/
            
            # Rename for clarity
            cd apk_output
            for f in *.apk; do
              if [ -f "$f" ]; then
                if [[ "$f" == *"armeabi-v7a"* ]]; then
                  mv "$f" "app-armeabi-v7a-${{ github.event.inputs.build_type }}.apk" 2>/dev/null || true
                elif [[ "$f" == *"arm64-v8a"* ]]; then
                  mv "$f" "app-arm64-v8a-${{ github.event.inputs.build_type }}.apk" 2>/dev/null || true
                elif [[ "$f" == *"x86_64"* ]]; then
                  mv "$f" "app-x86_64-${{ github.event.inputs.build_type }}.apk" 2>/dev/null || true
                elif [[ "$f" == *"universal"* ]]; then
                  mv "$f" "app-universal-${{ github.event.inputs.build_type }}.apk" 2>/dev/null || true
                else
                  mv "$f" "app-${{ github.event.inputs.build_type }}.apk" 2>/dev/null || true
                fi
              fi
            done
            cd ..
          fi
          
          echo "📦 Final APK list:"
          ls -la apk_output/ || true

      # ═══════════════════════════════════════════════════════════════════
      # 13. UPLOAD APK AS ARTIFACT
      # ═══════════════════════════════════════════════════════════════════
      - name: ⬆️ Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.build_type }}
          path: apk_output/
          retention-days: 7
          if-no-files-found: warn

      # ═══════════════════════════════════════════════════════════════════
      # 14. UPLOAD APK TO RELEASE
      # ═══════════════════════════════════════════════════════════════════
      - name: ⬆️ Upload APK to Release
        if: success() && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⬆️ Uploading APK to release..."
          
          # Check if there are APK files
          if [ -z "$(ls -A apk_output/*.apk 2>/dev/null)" ]; then
            echo "⚠️ No APK files found, skipping upload..."
            exit 0
          fi
          
          TAG="${{ github.event.inputs.tag }}"
          
          # Get release ID from tag
          RELEASE_RESPONSE=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          
          RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id')
          UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | jq -r '.upload_url')
          
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "⚠️ Release not found, creating new..."
            
            # Create release
            RELEASE_RESPONSE=$(curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases" \
              -d "{
                \"tag_name\": \"$TAG\",
                \"name\": \"Build $TAG\",
                \"draft\": false,
                \"prerelease\": false
              }")
            
            RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id')
            UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | jq -r '.upload_url')
          fi
          
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "⚠️ Failed to create/get release"
            echo "$RELEASE_RESPONSE"
            exit 0
          fi
          
          echo "✅ Release ID: $RELEASE_ID"
          
          # Upload each APK
          for apk in apk_output/*.apk; do
            if [ -f "$apk" ]; then
              filename=$(basename "$apk")
              echo "⬆️ Uploading $filename..."
              
              curl -s -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/vnd.android.package-archive" \
                --data-binary @"$apk" \
                "${UPLOAD_URL%\{?name,label\}}?name=$filename"
            fi
          done
          
          echo "✅ APK uploaded to release"

      # ═══════════════════════════════════════════════════════════════════
      # 15. NOTIFY SUCCESS
      # ═══════════════════════════════════════════════════════════════════
      - name: ✅ Build Success
        if: success()
        run: |
          echo "🎉 BUILD SUCCESS!"
          echo "📦 APK available in artifacts and release"
          echo "📋 Release tag: ${{ github.event.inputs.tag }}"
          echo "📋 Build type: ${{ github.event.inputs.build_type }}"
          
          # Show APK sizes
          if [ -d "apk_output" ]; then
            echo "📦 APK files:"
            ls -lh apk_output/ || true
          fi

      # ═══════════════════════════════════════════════════════════════════
      # 16. NOTIFY FAILURE WITH LOGS
      # ═══════════════════════════════════════════════════════════════════
      - name: ❌ Build Failed
        if: failure()
        run: |
          echo "❌ BUILD FAILED!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 Build details:"
          echo "  • Tag: ${{ github.event.inputs.tag }}"
          echo "  • Type: ${{ github.event.inputs.build_type }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          echo "📂 Project structure:"
          ls -la project/ 2>/dev/null | head -20 || echo "Project directory not found"
          
          echo "📂 Android directory:"
          ls -la project/android/ 2>/dev/null | head -10 || echo "Android directory not found"
          
          echo "📂 Build output:"
          find project/build -type f 2>/dev/null | head -20 || echo "Build output not found"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 Check logs above for the actual error"

      # ═══════════════════════════════════════════════════════════════════
      # 17. CLEANUP
      # ═══════════════════════════════════════════════════════════════════
      - name: 🧹 Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up..."
          rm -rf project/ apk_output/ project.zip 2>/dev/null || true
          echo "✅ Cleanup completed"