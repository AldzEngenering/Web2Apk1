# .github/workflows/web2apk.yml
name: 🌐 Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: '🌐 URL Website'
        required: true
        type: string
      app_name:
        description: '📱 Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: '🖼️ URL Icon (PNG/JPG)'
        required: true
        type: string

env:
  FLUTTER_VERSION: '3.24.3'
  JAVA_VERSION: '17'
  ANDROID_SDK_VERSION: '34.0.0'

jobs:
  build:
    name: 🌐 Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ═══════════════════════════════════════════════════════════════════
      # 1. CHECKOUT
      # ═══════════════════════════════════════════════════════════════════
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ═══════════════════════════════════════════════════════════════════
      # 2. INSTALL SYSTEM DEPENDENCIES
      # ═══════════════════════════════════════════════════════════════════
      - name: 📦 Install System Dependencies
        run: |
          echo "📦 Installing system dependencies..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl \
            git \
            unzip \
            xz-utils \
            zip \
            libglu1-mesa \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev \
            clang \
            cmake \
            build-essential \
            wget \
            ca-certificates \
            gnupg \
            lsb-release \
            file \
            imagemagick
          echo "✅ System dependencies installed"

      # ═══════════════════════════════════════════════════════════════════
      # 3. SETUP JAVA
      # ═══════════════════════════════════════════════════════════════════
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          # Tanpa cache karena Gradle file dibuat dinamis

      # ═══════════════════════════════════════════════════════════════════
      # 4. SETUP ANDROID SDK
      # ═══════════════════════════════════════════════════════════════════
      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: ${{ env.ANDROID_SDK_VERSION }}

      - name: 📱 Accept Android Licenses
        run: |
          echo "📱 Accepting Android SDK licenses..."
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          echo "✅ Android licenses accepted"

      - name: 📱 Install Android Build Tools
        run: |
          echo "📱 Installing Android build tools..."
          sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34" > /dev/null 2>&1 || true
          echo "✅ Android build tools installed"

      # ═══════════════════════════════════════════════════════════════════
      # 5. SETUP FLUTTER
      # ═══════════════════════════════════════════════════════════════════
      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: ✅ Verify Flutter Installation
        run: |
          echo "🔍 Verifying Flutter..."
          flutter --version
          
          if ! command -v flutter &> /dev/null; then
            echo "❌ Flutter not found in PATH!"
            exit 1
          fi
          
          echo "✅ Flutter installed successfully"

      - name: 🩺 Flutter Doctor
        run: |
          echo "🩺 Running Flutter Doctor..."
          flutter doctor -v || true
          echo "✅ Flutter Doctor completed"

      # ═══════════════════════════════════════════════════════════════════
      # 6. CREATE FLUTTER WEB PROJECT
      # ═══════════════════════════════════════════════════════════════════
      - name: 🎯 Create Flutter Web Project
        run: |
          echo "🎯 Creating Flutter web project..."
          
          flutter create --platforms=web webapp
          
          if [ ! -d "webapp" ]; then
            echo "❌ Failed to create Flutter project!"
            exit 1
          fi
          
          cd webapp
          
          echo "📦 Installing dependencies..."
          flutter pub add webview_flutter
          flutter pub add webview_flutter_plus
          flutter pub add flutter_native_splash
          flutter pub add flutter_launcher_icons
          
          echo "✅ Project created"

      # ═══════════════════════════════════════════════════════════════════
      # 7. DOWNLOAD DAN VALIDASI ICON
      # ═══════════════════════════════════════════════════════════════════
      - name: 🖼️ Download & Validate Icon
        run: |
          echo "🖼️ Downloading and validating icon..."
          
          mkdir -p webapp/assets
          
          # Download icon
          for i in 1 2 3; do
            echo "🔄 Attempt $i..."
            if curl -L -o webapp/assets/icon_raw.png "${{ github.event.inputs.icon_url }}"; then
              break
            fi
            sleep 2
          done
          
          if [ ! -f webapp/assets/icon_raw.png ]; then
            echo "❌ Failed to download icon!"
            exit 1
          fi
          
          # Check if file is valid image
          if ! file webapp/assets/icon_raw.png | grep -q "PNG\|JPEG\|JPG\|image"; then
            echo "⚠️ Downloaded file is not a valid image!"
            echo "📋 Creating fallback icon..."
            
            # Create fallback icon with ImageMagick
            convert -size 512x512 xc:blue \
              -font Helvetica -pointsize 100 -fill white \
              -gravity center -annotate +0+0 "APP" \
              webapp/assets/icon.png
          else
            # Convert to PNG if needed
            convert webapp/assets/icon_raw.png webapp/assets/icon.png 2>/dev/null || \
              cp webapp/assets/icon_raw.png webapp/assets/icon.png
          fi
          
          # Ensure icon exists
          if [ ! -f webapp/assets/icon.png ]; then
            echo "❌ Failed to create icon!"
            exit 1
          fi
          
          # Create splash from icon
          cp webapp/assets/icon.png webapp/assets/splash.png
          
          echo "✅ Icon ready"

      # ═══════════════════════════════════════════════════════════════════
      # 8. GENERATE MAIN.DART (TANPA SPLASH)
      # ═══════════════════════════════════════════════════════════════════
      - name: 📝 Generate main.dart
        run: |
          echo "📝 Generating main.dart..."
          
          cat > webapp/lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'APP_NAME_PLACEHOLDER',
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue),
                  useMaterial3: true,
                ),
                home: const WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController _controller;

            @override
            void initState() {
              super.initState();
              
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0x00000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageFinished: (String url) {
                      // Page loaded
                    },
                    onWebResourceError: (WebResourceError error) {
                      // Handle error
                    },
                  ),
                )
                ..loadRequest(Uri.parse('WEB_URL_PLACEHOLDER'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text('APP_NAME_PLACEHOLDER'),
                  centerTitle: true,
                  elevation: 0,
                ),
                body: SafeArea(
                  child: WebViewWidget(controller: _controller),
                ),
              );
            }
          }
          EOF
          
          APP_NAME="${{ github.event.inputs.app_name }}"
          WEB_URL="${{ github.event.inputs.web_url }}"
          
          sed -i "s|APP_NAME_PLACEHOLDER|$APP_NAME|g" webapp/lib/main.dart
          sed -i "s|WEB_URL_PLACEHOLDER|$WEB_URL|g" webapp/lib/main.dart
          
          echo "✅ main.dart generated"

      # ═══════════════════════════════════════════════════════════════════
      # 9. GENERATE ICON CONFIG (TANPA SPLASH)
      # ═══════════════════════════════════════════════════════════════════
      - name: 📝 Generate Icon Config
        run: |
          echo "📝 Generating icon config..."
          
          cat > webapp/flutter_launcher_icons.yaml << 'EOF'
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon.png"
            adaptive_icon_background: "#ffffff"
            adaptive_icon_foreground: "assets/icon.png"
            min_sdk_android: 21
          EOF
          
          echo "✅ Config generated"

      # ═══════════════════════════════════════════════════════════════════
      # 10. UPDATE PUBSPEC.YAML
      # ═══════════════════════════════════════════════════════════════════
      - name: 📝 Update pubspec.yaml
        run: |
          echo "📝 Updating pubspec.yaml..."
          
          cd webapp
          cp pubspec.yaml pubspec.yaml.bak
          
          APP_NAME="${{ github.event.inputs.app_name }}"
          PACKAGE_NAME=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]/_/g' | sed 's/_\+/_/g' | sed 's/^_//;s/_$//')
          sed -i "s/^name:.*/name: $PACKAGE_NAME/g" pubspec.yaml
          
          # Remove splash dependencies from pubspec
          sed -i '/flutter_native_splash/d' pubspec.yaml
          
          if ! grep -q "^flutter:" pubspec.yaml; then
            cat >> pubspec.yaml << 'EOF'
            
          flutter:
            uses-material-design: true
            assets:
              - assets/icon.png
          EOF
          fi
          
          echo "✅ pubspec.yaml updated"

      # ═══════════════════════════════════════════════════════════════════
      # 11. FIX GRADLE PROJECT (SEDERHANA)
      # ═══════════════════════════════════════════════════════════════════
      - name: 🔧 Fix Gradle Project
        working-directory: ./webapp
        run: |
          echo "🔧 Fixing Gradle project..."
          
          mkdir -p android/gradle/wrapper
          mkdir -p android/app/src/main
          
          # gradle-wrapper.properties
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # settings.gradle
          cat > android/settings.gradle << 'EOF'
          include ':app'
          def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
          def properties = new Properties()
          assert localPropertiesFile.exists()
          localPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
          def flutterSdkPath = properties.getProperty("flutter.sdk")
          assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
          apply from: "$flutterSdkPath/packages/flutter_tools/gradle/app_plugin_loader.gradle"
          EOF
          
          # local.properties
          cat > android/local.properties << 'EOF'
          sdk.dir=/usr/local/lib/android/sdk
          flutter.sdk=/opt/flutter
          EOF
          
          # project build.gradle
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          rootProject.buildDir = '../build'
          subprojects { project.buildDir = "${rootProject.buildDir}/${project.name}" }
          subprojects { project.evaluationDependsOn(':app') }
          tasks.register('clean', Delete) { delete rootProject.buildDir }
          EOF
          
          # app/build.gradle
          cat > android/app/build.gradle << 'EOF'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }
          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) {
              throw new GradleException("Flutter SDK not found.")
          }
          def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
          def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'
          
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          
          android {
              namespace 'com.example.webapp'
              compileSdkVersion 34
              ndkVersion flutter.ndkVersion
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
              sourceSets { main.java.srcDirs += 'src/main/kotlin' }
              defaultConfig {
                  applicationId "com.example.webapp"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                  }
              }
          }
          flutter { source '../..' }
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
          }
          EOF
          
          # proguard-rules.pro
          mkdir -p android/app
          cat > android/app/proguard-rules.pro << 'EOF'
          -keep class io.flutter.app.** { *; }
          -keep class io.flutter.plugin.**  { *; }
          -keep class io.flutter.util.**  { *; }
          -keep class io.flutter.view.**  { *; }
          -keep class io.flutter.**  { *; }
          -keep class io.flutter.plugins.**  { *; }
          EOF
          
          # AndroidManifest.xml
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.webapp">
              <application android:label="webapp" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          EOF
          
          echo "✅ Gradle project fixed!"

      # ═══════════════════════════════════════════════════════════════════
      # 12. FLUTTER CLEAN & PUB GET
      # ═══════════════════════════════════════════════════════════════════
      - name: 🧹 Flutter Clean
        working-directory: ./webapp
        run: |
          echo "🧹 Running flutter clean..."
          flutter clean || true
          echo "✅ Flutter clean completed"

      - name: 📦 Flutter Pub Get
        working-directory: ./webapp
        run: |
          echo "📦 Running flutter pub get..."
          
          for i in 1 2 3; do
            echo "🔄 Attempt $i..."
            if flutter pub get; then
              echo "✅ flutter pub get succeeded"
              break
            fi
            sleep 5
          done
          
          if [ $? -ne 0 ]; then
            echo "❌ flutter pub get failed after 3 attempts!"
            exit 1
          fi
          
          echo "✅ Dependencies installed"

      # ═══════════════════════════════════════════════════════════════════
      # 13. GENERATE ICON ONLY
      # ═══════════════════════════════════════════════════════════════════
      - name: 🖼️ Generate Icon
        working-directory: ./webapp
        run: |
          echo "🖼️ Generating icon..."
          flutter pub run flutter_launcher_icons:main || true
          echo "✅ Icon generated"

      # ═══════════════════════════════════════════════════════════════════
      # 14. BUILD APK
      # ═══════════════════════════════════════════════════════════════════
      - name: 🔨 Build APK
        working-directory: ./webapp
        run: |
          echo "🔨 Building APK..."
          
          # Try normal build
          if ! flutter build apk --release --split-per-abi; then
            echo "⚠️ Build failed, trying with --no-shuffle..."
            if ! flutter build apk --release --split-per-abi --no-shuffle; then
              echo "❌ All build attempts failed!"
              exit 1
            fi
          fi
          
          echo "✅ Build completed successfully!"

      # ═══════════════════════════════════════════════════════════════════
      # 15. COLLECT APK
      # ═══════════════════════════════════════════════════════════════════
      - name: 📦 Collect APK
        run: |
          echo "📦 Collecting APK..."
          mkdir -p apk_output
          
          find webapp/build -name "*.apk" -exec cp {} apk_output/ \; 2>/dev/null || true
          
          if [ -z "$(ls -A apk_output 2>/dev/null)" ]; then
            if [ -d "webapp/build/app/outputs/flutter-apk" ]; then
              cp webapp/build/app/outputs/flutter-apk/*.apk apk_output/ 2>/dev/null || true
            fi
          fi
          
          echo "📦 Final APK list:"
          ls -la apk_output/ || true

      # ═══════════════════════════════════════════════════════════════════
      # 16. UPLOAD APK
      # ═══════════════════════════════════════════════════════════════════
      - name: ⬆️ Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-apk
          path: apk_output/
          retention-days: 7
          if-no-files-found: warn

      # ═══════════════════════════════════════════════════════════════════
      # 17. NOTIFY
      # ═══════════════════════════════════════════════════════════════════
      - name: ✅ Build Success
        if: success()
        run: |
          echo "🎉 WEB TO APK SUCCESS!"
          echo "📱 App: ${{ github.event.inputs.app_name }}"
          echo "🌐 URL: ${{ github.event.inputs.web_url }}"

      - name: ❌ Build Failed
        if: failure()
        run: |
          echo "❌ WEB TO APK FAILED!"
          echo "📋 Check logs above"
