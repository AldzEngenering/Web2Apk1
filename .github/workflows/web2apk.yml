# .github/workflows/web2apk.yml
name: 🌐 Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: '🌐 URL Website'
        required: true
        type: string
      app_name:
        description: '📱 Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: '🖼️ URL Icon (PNG/JPG)'
        required: true
        type: string

env:
  FLUTTER_VERSION: '3.22.4'

jobs:
  build:
    name: 🌐 Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ═══════════════════════════════════════════════════════════════════
      # 1. CHECKOUT
      # ═══════════════════════════════════════════════════════════════════
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ═══════════════════════════════════════════════════════════════════
      # 2. INSTALL DEPENDENCIES (MINIMAL)
      # ═══════════════════════════════════════════════════════════════════
      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl unzip zip wget file

      # ═══════════════════════════════════════════════════════════════════
      # 3. SETUP FLUTTER
      # ═══════════════════════════════════════════════════════════════════
      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: ✅ Verify Flutter
        run: |
          flutter --version
          flutter doctor -v || true

      # ═══════════════════════════════════════════════════════════════════
      # 4. CREATE PROJECT (HANYA WEB)
      # ═══════════════════════════════════════════════════════════════════
      - name: 🎯 Create Web Project
        run: |
          echo "🎯 Creating web project..."
          
          # Buat project web saja (tanpa android)
          flutter create --platforms=web webapp
          
          if [ ! -d "webapp" ]; then
            echo "❌ Failed to create project!"
            exit 1
          fi
          
          echo "✅ Project created"

      # ═══════════════════════════════════════════════════════════════════
      # 5. GENERATE WEB CONTENT
      # ═══════════════════════════════════════════════════════════════════
      - name: 📝 Generate Web Content
        run: |
          echo "📝 Generating web content..."
          
          APP_NAME="${{ github.event.inputs.app_name }}"
          WEB_URL="${{ github.event.inputs.web_url }}"
          
          # Buat index.html sederhana dengan iframe
          mkdir -p webapp/web
          cat > webapp/web/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>$APP_NAME</title>
            <style>
              * { margin: 0; padding: 0; }
              body { overflow: hidden; height: 100vh; }
              iframe { width: 100%; height: 100%; border: none; }
            </style>
          </head>
          <body>
            <iframe src="$WEB_URL"></iframe>
          </body>
          </html>
          EOF
          
          echo "✅ Web content generated"

      # ═══════════════════════════════════════════════════════════════════
      # 6. DOWNLOAD ICON
      # ═══════════════════════════════════════════════════════════════════
      - name: 🖼️ Download Icon
        run: |
          echo "🖼️ Downloading icon..."
          
          mkdir -p webapp/web/assets
          
          if curl -L -o webapp/web/assets/icon.png "${{ github.event.inputs.icon_url }}"; then
            echo "✅ Icon downloaded"
          else
            echo "⚠️ Download failed, creating fallback..."
            echo "iVBORw0KGgoAAAANSUhEUgAAAgAAAAIACAYAAAD0eNT6AAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAOxAAADsQBlSsOGwAAABl0RVh0U29mdHdhcmUAd3d3Lmlua3NjYXBlLm9yZ5vuPBoAACAASURBVHic7N15nFxVne/xz7mnqrp6n50kQBISEAgBEkgAAQERcZ1RJkIQQR5KcWIM6rM
          " | base64 -d > webapp/web/assets/icon.png
          fi

      # ═══════════════════════════════════════════════════════════════════
      # 7. INSTALL PWA2APK
      # ═══════════════════════════════════════════════════════════════════
      - name: 📦 Install PWA2APK
        run: |
          echo "📦 Installing PWA2APK..."
          
          # Download PWA2APK
          wget -O pwa2apk.jar https://github.com/your-repo/pwa2apk/releases/latest/download/pwa2apk.jar || \
          wget -O pwa2apk.jar https://github.com/tfandkusu/pwa2apk/releases/download/v2.0.0/pwa2apk.jar
          
          if [ ! -f pwa2apk.jar ]; then
            echo "❌ Failed to download PWA2APK!"
            exit 1
          fi
          
          echo "✅ PWA2APK installed"

      # ═══════════════════════════════════════════════════════════════════
      # 8. BUILD APK WITH PWA2APK
      # ═══════════════════════════════════════════════════════════════════
      - name: 🔨 Build APK
        run: |
          echo "🔨 Building APK with PWA2APK..."
          
          APP_NAME="${{ github.event.inputs.app_name }}"
          PACKAGE_NAME=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
          
          # Build dengan PWA2APK
          java -jar pwa2apk.jar \
            --input webapp/web \
            --output app.apk \
            --name "$APP_NAME" \
            --package "com.$PACKAGE_NAME" \
            --icon webapp/web/assets/icon.png
          
          if [ ! -f app.apk ]; then
            echo "❌ PWA2APK build failed!"
            exit 1
          fi
          
          echo "✅ APK built successfully!"

      # ═══════════════════════════════════════════════════════════════════
      # 9. COLLECT APK
      # ═══════════════════════════════════════════════════════════════════
      - name: 📦 Collect APK
        run: |
          echo "📦 Collecting APK..."
          mkdir -p apk_output
          cp app.apk apk_output/
          echo "📦 APK:"
          ls -la apk_output/

      # ═══════════════════════════════════════════════════════════════════
      # 10. UPLOAD APK
      # ═══════════════════════════════════════════════════════════════════
      - name: ⬆️ Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-apk
          path: apk_output/
          retention-days: 7
          if-no-files-found: warn

      # ═══════════════════════════════════════════════════════════════════
      # 11. NOTIFY
      # ═══════════════════════════════════════════════════════════════════
      - name: ✅ Build Success
        if: success()
        run: |
          echo "🎉 WEB TO APK SUCCESS!"
          echo "📱 App: ${{ github.event.inputs.app_name }}"
          echo "🌐 URL: ${{ github.event.inputs.web_url }}"

      - name: ❌ Build Failed
        if: failure()
        run: |
          echo "❌ WEB TO APK FAILED!"
          echo "📋 Check logs above"
