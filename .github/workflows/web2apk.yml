name: Web to APK

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'Application name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL'
        required: true
        type: string

env:
  JAVA_VERSION: '17'
  ANDROID_SDK_VERSION: '34'

jobs:
  build:
    name: Build Web APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ─── 1. CHECKOUT PWA2APK TEMPLATE ──────────────────────────────────────
      - name: Checkout Web2Apk template
        uses: actions/checkout@v4
        with:
          repository: 'AldzEngenering/Web2Apk1'
          token: ${{ secrets.GITHUB_TOKEN }}
          path: web2apk

      # ─── 2. SETUP ENVIRONMENT ──────────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 'latest'
          packages: |
            platform-tools
            platforms;android-${{ env.ANDROID_SDK_VERSION }}
            build-tools;34.0.0
            extras;google;m2repository
            extras;android;m2repository

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.4'
          channel: 'stable'
          cache: true

      # ─── 3. DOWNLOAD ICON ──────────────────────────────────────────────────
      - name: Download icon
        id: download_icon
        run: |
          cd web2apk
          echo "🖼️ Downloading icon from: ${{ github.event.inputs.icon_url }}"
          curl -L -o app_icon.png "${{ github.event.inputs.icon_url }}"
          echo "✅ Icon downloaded: $(ls -lh app_icon.png | awk '{print $5}')"

          # Convert to PNG if needed
          file app_icon.png || true
          # Resize with ImageMagick if available
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
          convert app_icon.png -resize 512x512 app_icon.png 2>/dev/null || true
          echo "✅ Icon ready"

      # ─── 4. MODIFY CONFIG ───────────────────────────────────────────────────
      - name: Modify AndroidManifest.xml
        run: |
          cd web2apk/android/app/src/main
          sed -i "s|android:label=\".*\"|android:label=\"${{ github.event.inputs.app_name }}\"|g" AndroidManifest.xml
          echo "✅ AndroidManifest updated"

      - name: Modify strings.xml
        run: |
          cd web2apk/android/app/src/main/res/values
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${{ github.event.inputs.app_name }}</string>|g" strings.xml
          echo "✅ strings.xml updated"

      - name: Modify main.dart (webview URL)
        run: |
          cd web2apk/lib
          sed -i "s|'https://.*'|'${{ github.event.inputs.web_url }}'|g" main.dart
          echo "✅ main.dart updated"

      - name: Replace icon in all folders
        run: |
          cd web2apk
          # Copy icon to all mipmap folders
          for size in 48 72 96 144 192 512; do
            convert app_icon.png -resize ${size}x${size} -background transparent -gravity center -extent ${size}x${size} android/app/src/main/res/mipmap-mdpi/ic_launcher.png 2>/dev/null || true
          done

          # Copy to all density folders
          for folder in android/app/src/main/res/mipmap-*; do
            if [ -d "$folder" ]; then
              density=$(echo $folder | grep -o 'mipmap-[a-z]*' | sed 's/mipmap-//')
              case $density in
                mdpi)   size=48 ;;
                hdpi)   size=72 ;;
                xhdpi)  size=96 ;;
                xxhdpi) size=144 ;;
                xxxhdpi) size=192 ;;
                *)      size=192 ;;
              esac
              convert app_icon.png -resize ${size}x${size} -background transparent -gravity center -extent ${size}x${size} $folder/ic_launcher.png 2>/dev/null || cp app_icon.png $folder/ic_launcher.png
            fi
          done
          echo "✅ Icons replaced in all density folders"

      # ─── 5. BUILD APK ──────────────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: |
          cd web2apk
          flutter pub get
          echo "✅ Dependencies installed"

      - name: Build APK
        id: build_apk
        run: |
          cd web2apk
          echo "🔨 Building APK for: ${{ github.event.inputs.app_name }}"
          flutter build apk --release --no-tree-shake-icons

          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found!"
            exit 1
          fi

          echo "✅ APK built successfully!"
          ls -lh "$APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      # ─── 6. UPLOAD APK ──────────────────────────────────────────────────────
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ github.event.inputs.app_name }}
          path: web2apk/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
          if-no-files-found: error
