name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL (PNG)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      # 1. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Android SDK
      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $HOME/android-sdk
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          mv $HOME/android-sdk/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/ 2>/dev/null || true
          echo "y" | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools" >> $GITHUB_ENV

      # 4. Buat project Flutter baru dengan webview
      - name: Create Flutter WebView Project
        run: |
          flutter create --org com.web2app --project-name webview_app --platforms android .
          # Hapus default main.dart
          rm -f lib/main.dart
          # Buat main.dart dengan webview
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(WebViewApp());

          class WebViewApp extends StatelessWidget {
            const WebViewApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ github.event.inputs.app_name }}',
                theme: ThemeData(primarySwatch: Colors.blue),
                home: WebView(
                  initialUrl: '${{ github.event.inputs.web_url }}',
                  javascriptMode: JavascriptMode.unrestricted,
                  gestureNavigationEnabled: true,
                  zoomEnabled: true,
                ),
              );
            }
          }
          EOF

          # Tambahkan dependency webview_flutter
          flutter pub add webview_flutter

      # 5. Download icon
      - name: Download Icon
        run: |
          mkdir -p android/app/src/main/res
          wget -q "${{ github.event.inputs.icon_url }}" -O icon_temp.png
          # Convert to proper icon sizes
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          # Gunakan convert dari ImageMagick (bisa juga pakai sharp lewat npm)
          sudo apt-get install -y imagemagick
          convert icon_temp.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon_temp.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon_temp.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon_temp.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon_temp.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          rm -f icon_temp.png

      # 6. Ganti nama aplikasi di AndroidManifest.xml
      - name: Update App Name
        run: |
          sed -i 's/android:label="webview_app"/android:label="${{ github.event.inputs.app_name }}"/g' android/app/src/main/AndroidManifest.xml || true

      # 7. Flutter build
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi

      # 8. Verifikasi struktur APK
      - name: Verify APK Structure
        run: |
          APK_FILE=$(ls build/app/outputs/flutter-apk/*.apk 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "✅ APK ditemukan: $APK_FILE"
            echo "Struktur internal APK:"
            unzip -l "$APK_FILE" | grep -E "classes.dex|resources.arsc|AndroidManifest.xml|assets/flutter_assets|assets/dexopt|lib/|res/|META-INF"
          else
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi

      # 9. Upload APK sebagai artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 7

      # 10. Upload ke release
      - name: Upload to Release
        if: success()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-release.apk
          asset_name: ${{ github.event.inputs.app_name }}-webapp.apk
          asset_content_type: application/vnd.android.package-archive
