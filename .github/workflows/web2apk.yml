name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 35
    
    steps:
      # ==================== CHECKOUT ====================
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # ==================== SETUP JAVA ====================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      # ==================== SETUP FLUTTER ====================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true
          
      - name: Check Flutter Version
        run: flutter --version
        
      # ==================== INSTALL DEPENDENCIES ====================
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            imagemagick \
            wget \
            curl \
            file \
            jq

      # ==================== CREATE FLUTTER PROJECT ====================
      - name: Create Flutter WebView Project
        id: project_setup
        run: |
          echo "📁 Creating Flutter project: ${{ github.event.inputs.app_name }}"
          
          # Create clean project with proper naming
          PROJECT_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]//g')
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_OUTPUT
          
          flutter create \
            --org com.web2apk \
            --project-name "$PROJECT_NAME" \
            --platforms android \
            "$PROJECT_NAME"
          
          cd "$PROJECT_NAME"
          
          # ==================== DOWNLOAD AND CONVERT ICON ====================
          echo "🖼️ Downloading icon from: ${{ github.event.inputs.icon_url }}"
          mkdir -p assets/icon
          mkdir -p assets/splash
          
          ICON_URL="${{ github.event.inputs.icon_url }}"
          TEMP_ICON="/tmp/icon_$(date +%s).tmp"
          ICON_PATH="assets/icon/icon.png"
          
          echo "🔗 Icon URL: $ICON_URL"
          
          # ================================================================
          # STRATEGI DOWNLOAD ICON DENGAN MULTIPLE METHOD
          # ================================================================
          
          DOWNLOAD_SUCCESS=false
          
          # Method 1: Download langsung dari URL
          echo "📥 Method 1: Direct download..."
          if curl -f -L --max-time 30 \
               -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               -H "Accept: image/webp,image/apng,image/*,*/*;q=0.8" \
               -H "Accept-Encoding: gzip, deflate, br" \
               -o "$TEMP_ICON" "$ICON_URL" 2>/dev/null; then
            
            if [ -f "$TEMP_ICON" ] && [ -s "$TEMP_ICON" ]; then
              echo "✅ Method 1: Download berhasil"
              DOWNLOAD_SUCCESS=true
            fi
          fi
          
          # Method 2: Jika URL dari GitHub Release, coba dengan raw URL
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "📥 Method 2: Try GitHub raw URL..."
            if [[ "$ICON_URL" == *"github.com"* ]] && [[ "$ICON_URL" == *"/releases/"* ]]; then
              # Extract raw URL pattern
              RAW_URL=$(echo "$ICON_URL" | sed 's/github.com/raw.githubusercontent.com/' | sed 's/releases\/download/refs\/tags/')
              
              if curl -f -L --max-time 30 -o "$TEMP_ICON" "$RAW_URL" 2>/dev/null; then
                if [ -f "$TEMP_ICON" ] && [ -s "$TEMP_ICON" ]; then
                  echo "✅ Method 2: GitHub raw URL berhasil"
                  DOWNLOAD_SUCCESS=true
                fi
              fi
            fi
          fi
          
          # Method 3: Tambahkan ?raw=true parameter
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "📥 Method 3: Try with ?raw=true..."
            if curl -f -L --max-time 30 -o "$TEMP_ICON" "${ICON_URL}?raw=true" 2>/dev/null; then
              if [ -f "$TEMP_ICON" ] && [ -s "$TEMP_ICON" ]; then
                echo "✅ Method 3: Download dengan ?raw=true berhasil"
                DOWNLOAD_SUCCESS=true
              fi
            fi
          fi
          
          # Method 4: Coba wget sebagai fallback
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "📥 Method 4: Try wget..."
            if command -v wget &> /dev/null; then
              if wget -q -O "$TEMP_ICON" --timeout=30 "$ICON_URL" 2>/dev/null; then
                if [ -f "$TEMP_ICON" ] && [ -s "$TEMP_ICON" ]; then
                  echo "✅ Method 4: wget berhasil"
                  DOWNLOAD_SUCCESS=true
                fi
              fi
            fi
          fi
          
          # ================================================================
          # VALIDASI FILE YANG DIDOWNLOAD
          # ================================================================
          
          if [ "$DOWNLOAD_SUCCESS" = true ]; then
            echo "🔍 Validating downloaded file..."
            
            # Cek tipe file
            if command -v file &> /dev/null; then
              FILE_TYPE=$(file -b --mime-type "$TEMP_ICON" 2>/dev/null || echo "")
              echo "📋 File type: $FILE_TYPE"
            fi
            
            # Cek apakah file adalah gambar yang valid
            if command -v identify &> /dev/null; then
              if identify "$TEMP_ICON" > /dev/null 2>&1; then
                echo "✅ File terverifikasi sebagai gambar valid"
                
                # Dapatkan dimensi
                DIMENSIONS=$(identify -format "%wx%h" "$TEMP_ICON" 2>/dev/null || echo "unknown")
                echo "📐 Image dimensions: $DIMENSIONS"
                
                # Konversi ke PNG dengan resize
                echo "🔄 Converting to PNG 512x512..."
                if convert "$TEMP_ICON" -resize 512x512 -background white -flatten -quality 95 "$ICON_PATH" 2>/dev/null; then
                  echo "✅ Icon converted to PNG successfully"
                elif convert "$TEMP_ICON" -resize 512x512 -quality 95 "$ICON_PATH" 2>/dev/null; then
                  echo "✅ Icon converted to PNG (fallback method)"
                else
                  echo "⚠️ Conversion failed, creating placeholder"
                  DOWNLOAD_SUCCESS=false
                fi
              else
                echo "⚠️ Downloaded file is NOT a valid image"
                echo "--- First 200 bytes for debugging ---"
                head -c 200 "$TEMP_ICON" | cat -v
                echo ""
                echo "-------------------------------------"
                DOWNLOAD_SUCCESS=false
              fi
            else
              # Jika identify tidak ada, langsung konversi
              echo "🔄 Converting to PNG (no validation)..."
              if convert "$TEMP_ICON" -resize 512x512 -background white -flatten -quality 95 "$ICON_PATH" 2>/dev/null; then
                echo "✅ Icon converted to PNG"
                DOWNLOAD_SUCCESS=true
              else
                echo "⚠️ Conversion failed"
                DOWNLOAD_SUCCESS=false
              fi
            fi
          fi
          
          # ================================================================
          # BUAT PLACEHOLDER JIKA SEMUA METODE GAGAL
          # ================================================================
          
          if [ "$DOWNLOAD_SUCCESS" = false ] || [ ! -f "$ICON_PATH" ] || [ ! -s "$ICON_PATH" ]; then
            echo "❌ Gagal mendapatkan icon valid, membuat placeholder..."
            
            # Buat placeholder dengan ImageMagick
            if command -v convert &> /dev/null; then
              convert -size 512x512 xc:'#2196F3' -fill white -gravity center \
                -font Arial -pointsize 80 -annotate 0 "📱" \
                "$ICON_PATH" 2>/dev/null || \
              convert -size 512x512 xc:'#2196F3' -fill white -gravity center \
                -font Arial -pointsize 60 -annotate 0 "APP" \
                "$ICON_PATH" 2>/dev/null || \
              convert -size 512x512 xc:'#2196F3' "$ICON_PATH" 2>/dev/null
            fi
            
            # Fallback jika ImageMagick gagal
            if [ ! -f "$ICON_PATH" ] || [ ! -s "$ICON_PATH" ]; then
              # Buat PNG 1x1 pixel (transparent) + tambahkan warna biru
              echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > "$ICON_PATH"
              # Tambahkan warna biru dengan ImageMagick jika tersedia
              if command -v convert &> /dev/null; then
                convert -size 512x512 xc:'#2196F3' -fill white -gravity center \
                  -font Arial -pointsize 60 -annotate 0 "APP" \
                  "$ICON_PATH" 2>/dev/null
              fi
            fi
            
            echo "⚠️ Using placeholder icon"
          fi
          
          # Final verification
          if [ -f "$ICON_PATH" ] && [ -s "$ICON_PATH" ]; then
            if command -v identify &> /dev/null; then
              if identify "$ICON_PATH" > /dev/null 2>&1; then
                FINAL_SIZE=$(identify -format "%wx%h" "$ICON_PATH" 2>/dev/null || echo "unknown")
                echo "✅ Final icon ready: $FINAL_SIZE"
              else
                echo "⚠️ Final icon may be corrupted"
              fi
            else
              echo "✅ Final icon saved"
            fi
          else
            echo "❌ CRITICAL: Icon file is missing or empty!"
            # Emergency: create minimal icon
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > "$ICON_PATH"
          fi
          
          # Cleanup temp files
          rm -f "$TEMP_ICON" 2>/dev/null || true
          
          # ================================================================
          # PREPARE SPLASH SCREEN
          # ================================================================
          
          echo "🖼️ Preparing splash screen..."
          SPLASH_PATH="assets/splash/splash.png"
          
          if [ -f "$ICON_PATH" ] && [ -s "$ICON_PATH" ]; then
            cp "$ICON_PATH" "$SPLASH_PATH"
            
            # Create splash with white background
            if command -v convert &> /dev/null; then
              convert -size 200x200 xc:white "$SPLASH_PATH" -gravity center \
                -resize 150x150 -composite "$SPLASH_PATH" 2>/dev/null || \
              cp "$ICON_PATH" "$SPLASH_PATH"
            fi
            echo "✅ Splash image prepared"
          else
            echo "⚠️ Creating default splash"
            if command -v convert &> /dev/null; then
              convert -size 200x200 xc:white -fill '#2196F3' -gravity center \
                -font Arial -pointsize 60 -annotate 0 "📱" \
                "$SPLASH_PATH"
            else
              echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > "$SPLASH_PATH"
            fi
          fi
          
          echo "✅ Icon processing completed!"
          ls -la assets/icon/
          ls -la assets/splash/
          
          # ==================== UPDATE PUBSPEC ====================
          cat > pubspec.yaml << EOF
          name: $PROJECT_NAME
          description: Web to APK app
          version: 1.0.0+1
          
          environment:
            sdk: ">=3.0.0 <4.0.0"
          
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.0
            url_launcher: ^6.3.0
            connectivity_plus: ^6.0.0
            permission_handler: ^11.0.0
            flutter_native_splash: ^2.4.0
            
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
            flutter_launcher_icons: ^0.13.0
            
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon/icon.png"
            min_sdk_android: 21
            
          flutter_native_splash:
            color: "#ffffff"
            image: assets/splash/splash.png
            android: true
            ios: false
            
          flutter:
            uses-material-design: true
            assets:
              - assets/icon/
              - assets/splash/
          EOF
          
          # ==================== CREATE ANDROID MANIFEST ====================
          ESCAPED_APP_NAME=$(echo "${{ github.event.inputs.app_name }}" | sed 's/"/\\"/g')
          
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.web2apk.$PROJECT_NAME">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              
              <application
                  android:label="$ESCAPED_APP_NAME"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:allowBackup="true"
                  android:theme="@style/LaunchTheme">
                  
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                      
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # ==================== GENERATE ICONS & SPLASH ====================
          echo "🖼️ Generating app icons and splash..."
          flutter pub get
          
          # Generate launcher icons
          flutter pub run flutter_launcher_icons:main -f pubspec.yaml || \
          echo "⚠️ Icon generation warning (continuing)"
          
          # Generate splash screen
          flutter pub run flutter_native_splash:create --flavor android || \
          echo "⚠️ Splash generation skipped"

          # ==================== CREATE MAIN.DART ====================
          mkdir -p lib
          
          ESCAPED_URL=$(echo "${{ github.event.inputs.web_url }}" | sed 's/"/\\"/g')
          
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setEnabledSystemUIMode(SystemUiMode.immersiveSticky);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Web App',
                theme: ThemeData.dark(),
                home: const WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;
            bool isLoading = true;
            String errorMessage = '';

            @override
            void initState() {
              super.initState();
              _initWebView();
            }

            void _initWebView() {
              final url = Uri.parse("URL_PLACEHOLDER");

              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0xFF000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageStarted: (String url) {
                      setState(() {
                        isLoading = true;
                        errorMessage = '';
                      });
                    },
                    onPageFinished: (String url) {
                      setState(() {
                        isLoading = false;
                      });
                    },
                    onWebResourceError: (WebResourceError error) {
                      setState(() {
                        isLoading = false;
                        errorMessage = 'Error: ${error.description}';
                      });
                    },
                  ),
                )
                ..loadRequest(url);
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                extendBodyBehindAppBar: true, 
                body: Stack(
                  children: [
                    WebViewWidget(controller: controller),
                    if (isLoading)
                      const Center(
                        child: CircularProgressIndicator(
                          color: Colors.blue,
                          strokeWidth: 3.0,
                        ),
                      ),
                    if (errorMessage.isNotEmpty)
                      Center(
                        child: Column(
                          mainAxisAlignment: MainAxisAlignment.center,
                          children: [
                            const Icon(Icons.error_outline, color: Colors.red, size: 48),
                            const SizedBox(height: 16),
                            const Text(
                              'Gagal Memuat Halaman',
                              style: TextStyle(
                                color: Colors.white,
                                fontSize: 18,
                                fontWeight: FontWeight.bold,
                              ),
                            ),
                            const SizedBox(height: 8),
                            Text(
                              errorMessage,
                              textAlign: TextAlign.center,
                              style: const TextStyle(color: Colors.grey, fontSize: 14),
                            ),
                            const SizedBox(height: 16),
                            ElevatedButton(
                              onPressed: () {
                                setState(() {
                                  errorMessage = '';
                                  isLoading = true;
                                });
                                controller.reload();
                              },
                              child: const Text('Coba Lagi'),
                            ),
                          ],
                        ),
                      ),
                  ],
                ),
              );
            }
          }
          EOF
          
          # Suntikkan URL asli dan nama aplikasi
          sed -i "s|URL_PLACEHOLDER|$ESCAPED_URL|g" lib/main.dart
          sed -i "s|Web App|$ESCAPED_APP_NAME|g" lib/main.dart
          
          echo "✅ Project setup completed!"
          
      # ==================== BUILD APK ====================
      - name: Build APK
        id: build
        run: |
          PROJECT_NAME="${{ steps.project_setup.outputs.PROJECT_NAME }}"
          cd "$PROJECT_NAME"
          flutter clean
          flutter pub get
          flutter build apk --release
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> $GITHUB_OUTPUT
            echo "✅ Build success!"
          else
            echo "❌ Build failed!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: webapp-apk
          path: ${{ steps.project_setup.outputs.PROJECT_NAME }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
