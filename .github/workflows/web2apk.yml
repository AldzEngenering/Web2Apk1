name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 35
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true
          
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick wget curl file

      - name: Build APK
        id: build
        run: |
          # ========== SETUP PROJECT ==========
          APP_NAME="${{ github.event.inputs.app_name }}"
          WEB_URL="${{ github.event.inputs.web_url }}"
          ICON_URL="${{ github.event.inputs.icon_url }}"
          
          # Clean project name
          PROJECT_NAME=$(echo "$APP_NAME" | tr ' ' '_' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]//g')
          
          echo "📱 Building: $APP_NAME"
          echo "🌐 URL: $WEB_URL"
          echo "🖼️ Icon: $ICON_URL"
          
          # Create Flutter project
          flutter create --org com.web2apk --project-name "$PROJECT_NAME" --platforms android "$PROJECT_NAME"
          cd "$PROJECT_NAME"
          
          # ========== DOWNLOAD DAN VALIDASI ICON ==========
          mkdir -p assets/icon assets/splash
          
          echo "⬇️ Downloading icon..."
          
          # Download icon ke file temporary
          curl -L -o /tmp/icon_download "$ICON_URL" 2>/dev/null || \
          curl -L -o /tmp/icon_download "${ICON_URL}?raw=true" 2>/dev/null
          
          # Cek apakah file berhasil di download
          if [ -f /tmp/icon_download ] && [ -s /tmp/icon_download ]; then
            echo "✅ File downloaded"
            
            # Cek tipe file
            FILE_TYPE=$(file -b --mime-type /tmp/icon_download 2>/dev/null || echo "")
            echo "📋 File type: $FILE_TYPE"
            
            # Coba konversi ke PNG
            if command -v convert &> /dev/null; then
              echo "🔄 Converting to PNG..."
              # Force convert ke PNG
              convert /tmp/icon_download -resize 512x512 -quality 95 assets/icon/icon.png 2>/dev/null
              
              # Jika convert gagal, coba dengan format lain
              if [ ! -f assets/icon/icon.png ] || [ ! -s assets/icon/icon.png ]; then
                echo "🔄 Trying alternative conversion..."
                convert /tmp/icon_download[0] -resize 512x512 -quality 95 assets/icon/icon.png 2>/dev/null || \
                convert /tmp/icon_download -background white -flatten -resize 512x512 -quality 95 assets/icon/icon.png 2>/dev/null
              fi
            else
              # Jika ImageMagick tidak ada, copy langsung
              cp /tmp/icon_download assets/icon/icon.png
            fi
          fi
          
          # ========== BUAT PLACEHOLDER JIKA ICON GAGAL ==========
          if [ ! -f assets/icon/icon.png ] || [ ! -s assets/icon/icon.png ]; then
            echo "❌ Gagal membuat icon, membuat placeholder..."
            
            # Coba dengan ImageMagick
            if command -v convert &> /dev/null; then
              convert -size 512x512 xc:#2196F3 -fill white -gravity center \
                -font Arial -pointsize 80 -annotate 0 "APP" \
                assets/icon/icon.png 2>/dev/null
            fi
            
            # Fallback jika ImageMagick gagal
            if [ ! -f assets/icon/icon.png ] || [ ! -s assets/icon/icon.png ]; then
              # Buat PNG minimal (1x1 pixel)
              echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > assets/icon/icon.png
            fi
          else
            echo "✅ Icon berhasil dibuat: $(du -h assets/icon/icon.png | cut -f1)"
            
            # Verifikasi icon bisa dibaca
            if command -v identify &> /dev/null; then
              identify assets/icon/icon.png > /dev/null 2>&1
              if [ $? -ne 0 ]; then
                echo "⚠️ Icon tidak valid, membuat placeholder..."
                convert -size 512x512 xc:#2196F3 -fill white -gravity center \
                  -font Arial -pointsize 80 -annotate 0 "APP" \
                  assets/icon/icon.png 2>/dev/null
              fi
            fi
          fi
          
          # Copy untuk splash screen
          cp assets/icon/icon.png assets/splash/splash.png
          
          # ========== BUAT PUBSPEC.YAML ==========
          cat > pubspec.yaml << EOF
          name: $PROJECT_NAME
          description: Web to APK app
          version: 1.0.0+1
          
          environment:
            sdk: ">=3.0.0 <4.0.0"
          
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.0
            
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
            flutter_launcher_icons: ^0.13.0
            flutter_native_splash: ^2.4.0
            
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon/icon.png"
            min_sdk_android: 21
            
          flutter_native_splash:
            color: "#ffffff"
            image: assets/splash/splash.png
            android: true
            ios: false
            
          flutter:
            uses-material-design: true
          EOF
          
          # ========== BUAT ANDROID MANIFEST ==========
          ESCAPED_APP_NAME=$(echo "$APP_NAME" | sed 's/"/\\"/g')
          
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.web2apk.$PROJECT_NAME">
              
              <uses-permission android:name="android.permission.INTERNET" />
              
              <application
                  android:label="$ESCAPED_APP_NAME"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:theme="@style/LaunchTheme">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # ========== GENERATE ICON ==========
          echo "🔄 Generating launcher icons..."
          flutter pub get
          
          # Generate icon dengan force
          flutter pub run flutter_launcher_icons:main -f pubspec.yaml || \
          echo "⚠️ Icon generation warning, continuing..."
          
          # Generate splash
          flutter pub run flutter_native_splash:create --flavor android || echo "⚠️ Splash skipped"

          # ========== BUAT MAIN.DART ==========
          mkdir -p lib
          
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setEnabledSystemUIMode(SystemUiMode.immersiveSticky);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Web App',
                theme: ThemeData.dark(),
                home: const WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;
            bool isLoading = true;

            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageStarted: (url) => setState(() => isLoading = true),
                    onPageFinished: (url) => setState(() => isLoading = false),
                  ),
                )
                ..loadRequest(Uri.parse("URL_PLACEHOLDER"));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: Stack(
                  children: [
                    WebViewWidget(controller: controller),
                    if (isLoading)
                      const Center(
                        child: CircularProgressIndicator(color: Colors.blue),
                      ),
                  ],
                ),
              );
            }
          }
          EOF
          
          # Masukkan URL
          sed -i "s|URL_PLACEHOLDER|$WEB_URL|g" lib/main.dart
          sed -i "s|Web App|$ESCAPED_APP_NAME|g" lib/main.dart
          
          # ========== BUILD APK ==========
          echo "🔨 Building APK..."
          flutter clean
          flutter pub get
          flutter build apk --release
          
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ Build sukses!"
            echo "APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> $GITHUB_OUTPUT
          else
            echo "❌ Build gagal!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-apk
          path: ${{ github.event.inputs.app_name }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
