name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 35
    
    steps:
      # ==================== CHECKOUT ====================
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # ==================== SETUP JAVA (No Cache) ====================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          # Remove cache to avoid lock file errors
          
      # ==================== SETUP FLUTTER ====================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true
          
      - name: Check Flutter Version
        run: flutter --version
        
      # ==================== CREATE FLUTTER PROJECT ====================
      - name: Create Flutter WebView Project
        run: |
          echo "📁 Creating Flutter project: ${{ github.event.inputs.app_name }}"
          
          # Create clean project with proper naming
          PROJECT_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]//g')
          
          flutter create \
            --org com.web2apk \
            --project-name "$PROJECT_NAME" \
            --platforms android \
            "$PROJECT_NAME"
          
          cd "$PROJECT_NAME"
          
          # ==================== UPDATE PUBSPEC ====================
          cat > pubspec.yaml << 'EOF'
          name: $PROJECT_NAME
          description: Web to APK app
          version: 1.0.0+1
          
          environment:
            sdk: ">=3.0.0 <4.0.0"
          
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.0
            webview_flutter_android: ^3.12.0
            url_launcher: ^6.3.0
            connectivity_plus: ^6.0.0
            shared_preferences: ^2.2.0
            device_info_plus: ^10.0.0
            package_info_plus: ^8.0.0
            permission_handler: ^11.0.0
            flutter_localizations:
              sdk: flutter
            http: ^1.2.0
            cached_network_image: ^3.3.0
            flutter_native_splash: ^2.4.0
            flutter_launcher_icons: ^0.13.0
            
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
            
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon/icon.png"
            min_sdk_android: 21
            adaptive_icon_background: "#ffffff"
            adaptive_icon_foreground: "assets/icon/icon.png"
            
          flutter_native_splash:
            color: "#ffffff"
            image: assets/splash/splash.png
            android: true
            ios: false
            
          flutter:
            uses-material-design: true
            assets:
              - assets/icon/
              - assets/splash/
          EOF
          
          # ==================== CREATE MAIN.DART ====================
          mkdir -p lib
          cat > lib/main.dart << 'EOF'
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:webview_flutter_android/webview_flutter_android.dart';
          import 'package:url_launcher/url_launcher.dart';
          import 'package:connectivity_plus/connectivity_plus.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:device_info_plus/device_info_plus.dart';
          import 'package:cached_network_image/cached_network_image.dart';
          
          void main() {
            runApp(const MyApp());
          }
          
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ github.event.inputs.app_name }}',
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue),
                  useMaterial3: true,
                ),
                home: const WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }
          
          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});
            
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }
          
          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController _controller;
            bool _isLoading = true;
            bool _hasError = false;
            String _errorMessage = '';
            String _currentUrl = '${{ github.event.inputs.web_url }}';
            
            @override
            void initState() {
              super.initState();
              _initializeWebView();
              _checkConnectivity();
              _requestPermissions();
            }
            
            Future<void> _requestPermissions() async {
              if (Platform.isAndroid) {
                final androidInfo = await DeviceInfoPlugin().androidInfo;
                if (androidInfo.version.sdkInt >= 33) {
                  await [
                    Permission.notifications,
                  ].request();
                }
                await [
                  Permission.storage,
                  Permission.camera,
                  Permission.microphone,
                ].request();
              }
            }
            
            Future<void> _checkConnectivity() async {
              final connectivityResult = await Connectivity().checkConnectivity();
              if (connectivityResult == ConnectivityResult.none) {
                setState(() {
                  _hasError = true;
                  _errorMessage = 'Tidak ada koneksi internet';
                });
              }
            }
            
            void _initializeWebView() {
              final platform = WebViewPlatform.instance;
              if (platform is AndroidWebViewPlatform) {
                platform.platformParams = const AndroidWebViewPlatformParams(
                  useHybridComposition: true,
                );
              }
              
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0x00000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onProgress: (int progress) {
                      if (progress >= 100) {
                        setState(() {
                          _isLoading = false;
                        });
                      }
                    },
                    onPageStarted: (String url) {
                      setState(() {
                        _isLoading = true;
                        _hasError = false;
                        _currentUrl = url;
                      });
                    },
                    onPageFinished: (String url) {
                      setState(() {
                        _isLoading = false;
                        _currentUrl = url;
                      });
                    },
                    onWebResourceError: (WebResourceError error) {
                      setState(() {
                        _hasError = true;
                        _errorMessage = error.description ?? 'Error loading page';
                        _isLoading = false;
                      });
                    },
                    onNavigationRequest: (NavigationRequest request) {
                      if (request.url.startsWith('http')) {
                        return NavigationDecision.navigate;
                      }
                      return NavigationDecision.prevent;
                    },
                  ),
                )
                ..loadRequest(Uri.parse('${{ github.event.inputs.web_url }}'));
            }
            
            void _reloadPage() {
              setState(() {
                _hasError = false;
                _errorMessage = '';
                _isLoading = true;
              });
              _controller.loadRequest(Uri.parse(_currentUrl));
            }
            
            void _openInBrowser() async {
              final url = Uri.parse(_currentUrl);
              if (await canLaunchUrl(url)) {
                await launchUrl(url);
              }
            }
            
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: Stack(
                    children: [
                      WebViewWidget(controller: _controller),
                      if (_isLoading)
                        Container(
                          color: Colors.white,
                          child: const Center(
                            child: CircularProgressIndicator(),
                          ),
                        ),
                      if (_hasError)
                        Container(
                          color: Colors.white,
                          child: Center(
                            child: Column(
                              mainAxisAlignment: MainAxisAlignment.center,
                              children: [
                                Icon(
                                  Icons.error_outline,
                                  size: 64,
                                  color: Colors.red[300],
                                ),
                                const SizedBox(height: 16),
                                Text(
                                  'Error',
                                  style: TextStyle(
                                    fontSize: 20,
                                    fontWeight: FontWeight.bold,
                                    color: Colors.grey[800],
                                  ),
                                ),
                                const SizedBox(height: 8),
                                Padding(
                                  padding: const EdgeInsets.symmetric(horizontal: 32),
                                  child: Text(
                                    _errorMessage,
                                    textAlign: TextAlign.center,
                                    style: TextStyle(
                                      color: Colors.grey[600],
                                    ),
                                  ),
                                ),
                                const SizedBox(height: 24),
                                ElevatedButton.icon(
                                  onPressed: _reloadPage,
                                  icon: const Icon(Icons.refresh),
                                  label: const Text('Refresh'),
                                ),
                              ],
                            ),
                          ),
                        ),
                    ],
                  ),
                ),
                bottomNavigationBar: Container(
                  height: 56,
                  decoration: BoxDecoration(
                    color: Colors.white,
                    boxShadow: [
                      BoxShadow(
                        color: Colors.grey.withOpacity(0.2),
                        blurRadius: 8,
                      ),
                    ],
                  ),
                  child: Row(
                    mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                    children: [
                      IconButton(
                        onPressed: () async {
                          if (await _controller.canGoBack()) {
                            _controller.goBack();
                          }
                        },
                        icon: const Icon(Icons.arrow_back_ios),
                      ),
                      IconButton(
                        onPressed: _reloadPage,
                        icon: const Icon(Icons.refresh),
                      ),
                      IconButton(
                        onPressed: () async {
                          if (await _controller.canGoForward()) {
                            _controller.goForward();
                          }
                        },
                        icon: const Icon(Icons.arrow_forward_ios),
                      ),
                      IconButton(
                        onPressed: _openInBrowser,
                        icon: const Icon(Icons.open_in_browser),
                      ),
                    ],
                  ),
                ),
              );
            }
          }
          EOF
          
          # ==================== CREATE ANDROID MANIFEST ====================
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.web2apk.$PROJECT_NAME">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              
              <application
                  android:label="${{ github.event.inputs.app_name }}"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:allowBackup="true"
                  android:theme="@style/LaunchTheme">
                  
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                      
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # ==================== DOWNLOAD ICON ====================
          echo "🖼️ Downloading icon..."
          mkdir -p assets/icon
          mkdir -p assets/splash
          
          curl -L -o assets/icon/icon.png "${{ github.event.inputs.icon_url }}" || echo "⚠️ Icon download failed, using default"
          
          # Copy icon as splash
          cp assets/icon/icon.png assets/splash/splash.png 2>/dev/null || echo "⚠️ No icon for splash"
          
          # ==================== GENERATE SPLASH ====================
          echo "🖼️ Generating splash screen..."
          flutter pub get
          flutter pub run flutter_native_splash:create --flavor android || echo "⚠️ Splash generation skipped"
          
          # ==================== GENERATE ICONS ====================
          echo "🖼️ Generating app icons..."
          flutter pub run flutter_launcher_icons:main -f pubspec.yaml || echo "⚠️ Icon generation skipped"
          
          # ==================== BUILD APK ====================
          echo "🔨 Building APK..."
          flutter clean
          flutter pub get
          flutter build apk --release --split-per-abi --no-tree-shake-icons
          
          echo "✅ Build completed!"
          
      # ==================== VERIFY APK ====================
      - name: Verify APK
        run: |
          PROJECT_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]//g')
          cd "$PROJECT_NAME"
          APK_DIR="build/app/outputs/flutter-apk/"
          
          echo "🔍 Verifying APK files..."
          if [ -d "$APK_DIR" ]; then
            APK_COUNT=$(ls -1 $APK_DIR/*.apk 2>/dev/null | wc -l)
            echo "📁 Found $APK_COUNT APK file(s)"
            ls -la $APK_DIR
            
            if [ $APK_COUNT -eq 0 ]; then
              echo "❌ ERROR: No APK files found!"
              exit 1
            fi
          else
            echo "❌ ERROR: APK directory not found!"
            exit 1
          fi
          
      # ==================== ZIP APK FILES ====================
      - name: Zip APK Files
        run: |
          PROJECT_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]//g')
          cd "$PROJECT_NAME"
          mkdir -p apk_output
          cp build/app/outputs/flutter-apk/*.apk apk_output/
          cd apk_output
          zip -r ../web2apk_bundle.zip *.apk
          cd ..
          echo "✅ APK Bundle created:"
          ls -la web2apk_bundle.zip
          
      # ==================== UPLOAD ARTIFACT ====================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-bundle
          path: ${{ github.event.inputs.app_name }}/web2apk_bundle.zip
          retention-days: 7
