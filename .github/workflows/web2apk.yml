# .github/workflows/web2apk.yml
name: 🌐 Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon (PNG)'
        required: true
        type: string

env:
  FLUTTER_VERSION: '3.24.3'

jobs:
  build:
    name: 🌐 Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ─── 1. CHECKOUT ──────────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ─── 2. INSTALL DEPENDENCIES ─────────────────────────────────────────
      - name: 📦 Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            git \
            unzip \
            xz-utils \
            zip \
            libglu1-mesa \
            openjdk-17-jdk \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev

      # ─── 3. SETUP JAVA ────────────────────────────────────────────────────
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ─── 4. SETUP ANDROID SDK ────────────────────────────────────────────
      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: '34.0.0'

      # ─── 5. SETUP FLUTTER ─────────────────────────────────────────────────
      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ─── 6. VERIFY FLUTTER ────────────────────────────────────────────────
      - name: ✅ Verify Flutter Installation
        run: |
          echo "🔍 Verifying Flutter..."
          flutter --version
          flutter doctor -v
          
          if ! command -v flutter &> /dev/null; then
            echo "❌ Flutter not found in PATH!"
            exit 1
          fi
          
          echo "✅ Flutter installed successfully"

      # ─── 7. CREATE FLUTTER WEB PROJECT ──────────────────────────────────
      - name: 🎯 Create Flutter Web Project
        run: |
          echo "🎯 Creating Flutter web project..."
          
          # Buat project baru
          flutter create --platforms=web webapp
          
          if [ ! -d "webapp" ]; then
            echo "❌ Failed to create Flutter project!"
            exit 1
          fi
          
          cd webapp
          
          # Install dependencies
          echo "📦 Installing dependencies..."
          flutter pub add webview_flutter
          flutter pub add webview_flutter_plus
          flutter pub add flutter_native_splash
          flutter pub add flutter_launcher_icons
          
          echo "✅ Project created"

      # ─── 8. DOWNLOAD ICON ──────────────────────────────────────────────────
      - name: 🖼️ Download Icon
        run: |
          echo "🖼️ Downloading icon..."
          
          mkdir -p webapp/assets
          
          # Download icon dari URL
          if ! curl -L -o webapp/assets/icon.png "${{ github.event.inputs.icon_url }}"; then
            echo "❌ Failed to download icon!"
            exit 1
          fi
          
          # Buat splash dari icon
          cp webapp/assets/icon.png webapp/assets/splash.png
          
          # Check if icon exists
          if [ ! -f webapp/assets/icon.png ]; then
            echo "❌ Icon download failed!"
            exit 1
          fi
          
          # Check if icon is valid image
          if ! file webapp/assets/icon.png | grep -q "PNG image"; then
            echo "⚠️ Icon is not a valid PNG image, but continuing..."
          fi
          
          echo "✅ Icon downloaded"

      # ─── 9. GENERATE MAIN.DART ────────────────────────────────────────────
      - name: 📝 Generate main.dart
        run: |
          echo "📝 Generating main.dart..."
          
          cat > webapp/lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:flutter_native_splash/flutter_native_splash.dart';

          void main() {
            WidgetsBinding widgetsBinding = WidgetsFlutterBinding.ensureInitialized();
            FlutterNativeSplash.preserve(widgetsBinding: widgetsBinding);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ github.event.inputs.app_name }}',
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue),
                  useMaterial3: true,
                ),
                home: const WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController _controller;

            @override
            void initState() {
              super.initState();
              
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0x00000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageFinished: (String url) {
                      FlutterNativeSplash.remove();
                    },
                    onWebResourceError: (WebResourceError error) {
                      FlutterNativeSplash.remove();
                    },
                  ),
                )
                ..loadRequest(Uri.parse('${{ github.event.inputs.web_url }}'));
              
              // Remove splash after 3 seconds max
              Future.delayed(const Duration(seconds: 3), () {
                FlutterNativeSplash.remove();
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text('${{ github.event.inputs.app_name }}'),
                  centerTitle: true,
                  elevation: 0,
                ),
                body: SafeArea(
                  child: WebViewWidget(controller: _controller),
                ),
              );
            }
          }
          EOF
          
          echo "✅ main.dart generated"

      # ─── 10. GENERATE ICON CONFIG ──────────────────────────────────────────
      - name: 📝 Generate Icon Config
        run: |
          echo "📝 Generating icon config..."
          
          cat > webapp/flutter_launcher_icons.yaml << 'EOF'
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon.png"
            adaptive_icon_background: "#ffffff"
            adaptive_icon_foreground: "assets/icon.png"
            min_sdk_android: 21
          EOF
          
          cat > webapp/flutter_native_splash.yaml << 'EOF'
          flutter_native_splash:
            color: "#ffffff"
            image: assets/splash.png
            android: true
            android_gravity: center
          EOF
          
          echo "✅ Configs generated"

      # ─── 11. UPDATE PUBSPEC.YAML ──────────────────────────────────────────
      - name: 📝 Update pubspec.yaml
        run: |
          echo "📝 Updating pubspec.yaml..."
          
          cd webapp
          
          # Backup original
          cp pubspec.yaml pubspec.yaml.bak
          
          # Update name
          sed -i "s/^name:.*/name: webapp/g" pubspec.yaml
          
          # Add flutter section if not exists
          if ! grep -q "^flutter:" pubspec.yaml; then
            cat >> pubspec.yaml << 'EOF'
            
          flutter:
            uses-material-design: true
            assets:
              - assets/icon.png
              - assets/splash.png
          EOF
          fi
          
          echo "✅ pubspec.yaml updated"

      # ─── 12. FLUTTER CLEAN & PUB GET ──────────────────────────────────────
      - name: 🧹 Flutter Clean & Pub Get
        working-directory: ./webapp
        run: |
          echo "🧹 Running flutter clean..."
          flutter clean || true
          
          echo "📦 Running flutter pub get..."
          flutter pub get
          
          if [ $? -ne 0 ]; then
            echo "❌ flutter pub get failed!"
            exit 1
          fi
          
          echo "✅ Dependencies installed"

      # ─── 13. GENERATE ICONS ────────────────────────────────────────────────
      - name: 🖼️ Generate Icons
        working-directory: ./webapp
        run: |
          echo "🖼️ Generating icons..."
          flutter pub run flutter_launcher_icons:main || true
          echo "✅ Icons generated (or skipped)"

      # ─── 14. GENERATE SPLASH ──────────────────────────────────────────────
      - name: 🖼️ Generate Splash
        working-directory: ./webapp
        run: |
          echo "🖼️ Generating splash..."
          flutter pub run flutter_native_splash:create || true
          echo "✅ Splash generated (or skipped)"

      # ─── 15. BUILD APK ─────────────────────────────────────────────────────
      - name: 🔨 Build APK
        working-directory: ./webapp
        run: |
          echo "🔨 Building APK..."
          
          # Build dengan release
          flutter build apk --release --split-per-abi
          
          if [ $? -ne 0 ]; then
            echo "❌ Build failed!"
            echo "📋 Checking build output..."
            ls -la build/app/outputs/flutter-apk/ || true
            exit 1
          fi
          
          echo "✅ Build completed"

      # ─── 16. COLLECT APK ──────────────────────────────────────────────────
      - name: 📦 Collect APK
        run: |
          echo "📦 Collecting APK..."
          mkdir -p apk_output
          
          # Find all APK files
          find webapp/build -name "*.apk" -exec cp {} apk_output/ \; 2>/dev/null || true
          
          # If no APK found, try alternative path
          if [ -z "$(ls -A apk_output 2>/dev/null)" ]; then
            echo "⚠️ No APK found in build directory!"
            echo "📋 Checking build directory..."
            find webapp/build -type f -name "*.apk" 2>/dev/null || echo "No APK found!"
            
            # Create dummy file to avoid artifact error
            echo "No APK generated" > apk_output/README.txt
          else
            echo "📦 APK files found:"
            ls -la apk_output/
            
            # Rename for clarity
            cd apk_output
            for f in *.apk; do
              if [ -f "$f" ]; then
                if [[ "$f" == *"armeabi-v7a"* ]]; then
                  mv "$f" "webapp-armeabi-v7a.apk" 2>/dev/null || true
                elif [[ "$f" == *"arm64-v8a"* ]]; then
                  mv "$f" "webapp-arm64-v8a.apk" 2>/dev/null || true
                elif [[ "$f" == *"x86_64"* ]]; then
                  mv "$f" "webapp-x86_64.apk" 2>/dev/null || true
                else
                  mv "$f" "webapp.apk" 2>/dev/null || true
                fi
              fi
            done
            cd ..
          fi

      # ─── 17. UPLOAD APK AS ARTIFACT ──────────────────────────────────────
      - name: ⬆️ Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-apk
          path: apk_output/
          retention-days: 7

      # ─── 18. CREATE RELEASE ───────────────────────────────────────────────
      - name: 📦 Create Release
        if: success() && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Creating release..."
          
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          TAG="webapp_$TIMESTAMP"
          
          # Check if there are any APK files
          if [ -z "$(ls -A apk_output/*.apk 2>/dev/null)" ]; then
            echo "⚠️ No APK found, skipping release creation..."
            exit 0
          fi
          
          # Create release
          RELEASE_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{
              \"tag_name\": \"$TAG\",
              \"name\": \"Web App $TIMESTAMP\",
              \"draft\": false,
              \"prerelease\": false
            }")
          
          RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id')
          UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | jq -r '.upload_url')
          
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "⚠️ Failed to create release"
            echo "$RELEASE_RESPONSE"
            exit 0
          fi
          
          # Upload APKs
          for apk in apk_output/*.apk; do
            if [ -f "$apk" ]; then
              filename=$(basename "$apk")
              echo "⬆️ Uploading $filename..."
              
              curl -s -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/vnd.android.package-archive" \
                --data-binary @"$apk" \
                "${UPLOAD_URL%\{?name,label\}}?name=$filename"
            fi
          done
          
          echo "✅ Release created: $TAG"

      # ─── 19. NOTIFY SUCCESS ──────────────────────────────────────────────
      - name: ✅ Build Success
        if: success()
        run: |
          echo "🎉 WEB TO APK SUCCESS!"
          echo "📦 APK available in artifacts"
          ls -la apk_output/ || true

      # ─── 20. NOTIFY FAILURE ──────────────────────────────────────────────
      - name: ❌ Build Failed
        if: failure()
        run: |
          echo "❌ WEB TO APK FAILED!"
          echo "📋 Check logs above for details"
          echo "📋 Build directory contents:"
          find webapp/build -type f 2>/dev/null | head -20 || echo "Build directory not found"