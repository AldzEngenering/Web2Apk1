name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon (Logo)'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── SETUP FLUTTER ──────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # ─── SETUP JAVA ─────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ─── SETUP ANDROID SDK ─────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 'latest'
          build-tools-version: '34.0.0'
          platform-version: '34'

      # ─── ACCEPT ANDROID SDK LICENSES ──────────────────
      - name: Accept Android SDK Licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_HOME/licenses/android-sdk-preview-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "✅ Android SDK licenses accepted!"

      # ─── INSTALL DEPENDENCIES ──────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            liblzma-dev \
            git \
            unzip \
            curl \
            wget \
            imagemagick \
            file

      # ─── CREATE FLUTTER PROJECT ────────────────────────
      - name: Create Flutter project
        id: create_project
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          PACKAGE_NAME=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g' | sed 's/__*/_/g' | sed 's/^_//' | sed 's/_$//')
          
          echo "📱 Creating project: $PACKAGE_NAME"
          
          flutter create --org com.web2apk --project-name "$PACKAGE_NAME" webapp
          
          echo "✅ Project created!"

      # ─── ADD WEBVIEW FLUTTER ───────────────────────────
      - name: Add webview_flutter dependency
        run: |
          cd webapp
          
          if grep -q "^dependencies:" pubspec.yaml; then
            sed -i '/^dependencies:/a\  webview_flutter: ^4.7.0' pubspec.yaml
          else
            echo "" >> pubspec.yaml
            echo "dependencies:" >> pubspec.yaml
            echo "  webview_flutter: ^4.7.0" >> pubspec.yaml
          fi
          
          flutter pub get
          echo "✅ Dependencies installed!"

      # ─── DOWNLOAD ICON (DENGAN VALIDASI) ──────────────
      - name: Download and validate icon
        id: download_icon
        run: |
          ICON_URL="${{ github.event.inputs.icon_url }}"
          echo "🖼️ Downloading icon from: $ICON_URL"
          
          # Buat folder icon
          mkdir -p webapp/android/app/src/main/res/mipmap-hdpi
          mkdir -p webapp/android/app/src/main/res/mipmap-mdpi
          mkdir -p webapp/android/app/src/main/res/mipmap-xhdpi
          mkdir -p webapp/android/app/src/main/res/mipmap-xxhdpi
          mkdir -p webapp/android/app/src/main/res/mipmap-xxxhdpi
          
          # Download dengan header User-Agent
          curl -L -o icon.png \
            -H "User-Agent: Mozilla/5.0" \
            "$ICON_URL"
          
          # 🔥 VALIDASI: Cek apakah file benar-benar gambar
          echo "📋 Checking file type..."
          file icon.png
          
          # Cek jika file kosong
          if [ ! -s icon.png ]; then
            echo "❌ File icon kosong!"
            exit 1
          fi
          
          # Cek apakah file adalah gambar
          if ! file icon.png | grep -q "image"; then
            echo "⚠️ File bukan gambar! Isi file:"
            head -c 200 icon.png
            echo ""
            echo "❌ URL tidak mengembalikan gambar yang valid!"
            exit 1
          fi
          
          echo "✅ Icon downloaded and validated!"

      # ─── RESIZE ICON ────────────────────────────────────
      - name: Resize icon
        run: |
          echo "🖼️ Resizing icon..."
          
          # 🔥 AMAN: Gunakan convert dengan validasi
          if ! convert icon.png -resize 48x48 webapp/android/app/src/main/res/mipmap-mdpi/ic_launcher.png; then
            echo "❌ Failed to resize to mdpi"
            exit 1
          fi
          
          if ! convert icon.png -resize 72x72 webapp/android/app/src/main/res/mipmap-hdpi/ic_launcher.png; then
            echo "❌ Failed to resize to hdpi"
            exit 1
          fi
          
          if ! convert icon.png -resize 96x96 webapp/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png; then
            echo "❌ Failed to resize to xhdpi"
            exit 1
          fi
          
          if ! convert icon.png -resize 144x144 webapp/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png; then
            echo "❌ Failed to resize to xxhdpi"
            exit 1
          fi
          
          if ! convert icon.png -resize 192x192 webapp/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png; then
            echo "❌ Failed to resize to xxxhdpi"
            exit 1
          fi
          
          echo "✅ Icon resized successfully!"
          
          # Tampilkan hasil
          echo "📋 Resized icons:"
          ls -la webapp/android/app/src/main/res/mipmap-*/ic_launcher.png

      # ─── GENERATE WEBVIEW CODE ──────────────────────────
      - name: Generate WebView code
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          WEB_URL="${{ github.event.inputs.web_url }}"
          
          cat > webapp/lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          
          void main() {
            runApp(const MyApp());
          }
          
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
          
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'APP_NAME_PLACEHOLDER',
                theme: ThemeData(
                  primarySwatch: Colors.blue,
                  useMaterial3: true,
                ),
                home: const WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }
          
          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});
          
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }
          
          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;
          
            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..loadRequest(Uri.parse('WEB_URL_PLACEHOLDER'));
            }
          
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text('APP_NAME_PLACEHOLDER'),
                  centerTitle: true,
                  backgroundColor: Colors.blue,
                  foregroundColor: Colors.white,
                ),
                body: WebViewWidget(controller: controller),
              );
            }
          }
          EOF
          
          sed -i "s|APP_NAME_PLACEHOLDER|$APP_NAME|g" webapp/lib/main.dart
          sed -i "s|WEB_URL_PLACEHOLDER|$WEB_URL|g" webapp/lib/main.dart
          
          echo "✅ WebView code generated!"

      # ─── UPDATE ANDROID MANIFEST ──────────────────────
      - name: Update Android Manifest
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          
          sed -i 's|<application|<application android:label="'"$APP_NAME"'"|g' \
            webapp/android/app/src/main/AndroidManifest.xml
          
          if ! grep -q "android.permission.INTERNET" webapp/android/app/src/main/AndroidManifest.xml; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' \
              webapp/android/app/src/main/AndroidManifest.xml
          fi
          
          echo "✅ Android Manifest updated!"

      # ─── FALLBACK ICON (JIKA GAGAL) ────────────────────
      - name: Generate fallback icon
        if: failure() && steps.download_icon.outcome == 'failure'
        run: |
          echo "⚠️ Generating fallback icon..."
          
          # Buat icon default dengan ImageMagick
          convert -size 192x192 xc:blue \
            -fill white -gravity center \
            -font Arial -pointsize 60 \
            -draw "text 0,0 'WEB'" \
            webapp/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          # Copy ke semua resolusi
          for size in 48 72 96 144; do
            convert -size ${size}x${size} xc:blue \
              -fill white -gravity center \
              -font Arial -pointsize $((size/3)) \
              -draw "text 0,0 'W'" \
              webapp/android/app/src/main/res/mipmap-${size}/ic_launcher.png 2>/dev/null || true
          done
          
          echo "✅ Fallback icon generated!"

      # ─── BUILD APK ──────────────────────────────────────
      - name: Build APK
        id: build_apk
        run: |
          cd webapp
          
          echo "🔨 Building APK..."
          flutter build apk --release
          
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built!"
            echo "APK_SIZE=$(du -h $APK_PATH | cut -f1)" >> $GITHUB_OUTPUT
          else
            echo "❌ APK not found!"
            find . -name "*.apk" 2>/dev/null || echo "No APK found"
            exit 1
          fi

      # ─── UPLOAD APK ────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: webapp-apk
          path: webapp/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
          if-no-files-found: error

      # ─── BUILD SUMMARY ─────────────────────────────────
      - name: Build Summary
        run: |
          echo "## ✅ Web to APK Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App Name | ${{ github.event.inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web URL | ${{ github.event.inputs.web_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | ${{ steps.build_apk.outputs.APK_SIZE }} |" >> $GITHUB_STEP_SUMMARY
