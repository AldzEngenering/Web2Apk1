# .github/workflows/web2apk.yml
name: 🌐 Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: '🌐 URL Website'
        required: true
        type: string
      app_name:
        description: '📱 Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: '🖼️ URL Icon (PNG/JPG)'
        required: true
        type: string

env:
  FLUTTER_VERSION: '^4.7.0'  # Turunkan ke versi lebih stabil
  JAVA_VERSION: '17'
  ANDROID_SDK_VERSION: '34.0.0'

jobs:
  build:
    name: 🌐 Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ═══════════════════════════════════════════════════════════════════
      # 1. CHECKOUT
      # ═══════════════════════════════════════════════════════════════════
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ═══════════════════════════════════════════════════════════════════
      # 2. INSTALL SYSTEM DEPENDENCIES
      # ═══════════════════════════════════════════════════════════════════
      - name: 📦 Install System Dependencies
        run: |
          echo "📦 Installing system dependencies..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl \
            git \
            unzip \
            xz-utils \
            zip \
            libglu1-mesa \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev \
            clang \
            cmake \
            build-essential \
            wget \
            ca-certificates \
            gnupg \
            lsb-release \
            file \
            imagemagick
          echo "✅ System dependencies installed"

      # ═══════════════════════════════════════════════════════════════════
      # 3. SETUP JAVA
      # ═══════════════════════════════════════════════════════════════════
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ═══════════════════════════════════════════════════════════════════
      # 4. SETUP ANDROID SDK
      # ═══════════════════════════════════════════════════════════════════
      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: ${{ env.ANDROID_SDK_VERSION }}

      - name: 📱 Accept Android Licenses
        run: |
          echo "📱 Accepting Android SDK licenses..."
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          echo "✅ Android licenses accepted"

      # ═══════════════════════════════════════════════════════════════════
      # 5. SETUP FLUTTER
      # ═══════════════════════════════════════════════════════════════════
      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: ✅ Verify Flutter
        run: |
          flutter --version
          flutter doctor -v || true

      # ═══════════════════════════════════════════════════════════════════
      # 6. CREATE PROJECT DENGAN TEMPLATE SEDERHANA
      # ═══════════════════════════════════════════════════════════════════
      - name: 🎯 Create Flutter Project
        run: |
          echo "🎯 Creating Flutter project..."
          
          # Buat project dengan template app (bukan web)
          flutter create --platforms=android webapp
          
          cd webapp
          
          # Hanya install webview_flutter
          flutter pub add webview_flutter:^4.4.2
          
          echo "✅ Project created"

      # ═══════════════════════════════════════════════════════════════════
      # 7. DOWNLOAD ICON
      # ═══════════════════════════════════════════════════════════════════
      - name: 🖼️ Download Icon
        run: |
          echo "🖼️ Downloading icon..."
          
          mkdir -p webapp/assets
          
          # Download dengan fallback
          if ! curl -L -o webapp/assets/icon.png "${{ github.event.inputs.icon_url }}"; then
            echo "⚠️ Download failed, creating fallback icon..."
            convert -size 512x512 xc:blue \
              -font Helvetica -pointsize 100 -fill white \
              -gravity center -annotate +0+0 "WEB" \
              webapp/assets/icon.png
          fi
          
          # Pastikan icon valid
          if ! file webapp/assets/icon.png | grep -q "PNG\|image"; then
            echo "⚠️ Invalid icon, creating fallback..."
            convert -size 512x512 xc:blue \
              -font Helvetica -pointsize 100 -fill white \
              -gravity center -annotate +0+0 "WEB" \
              webapp/assets/icon.png
          fi
          
          echo "✅ Icon ready"

      # ═══════════════════════════════════════════════════════════════════
      # 8. GENERATE MAIN.DART (SANGAT SEDERHANA)
      # ═══════════════════════════════════════════════════════════════════
      - name: 📝 Generate main.dart
        run: |
          echo "📝 Generating main.dart..."
          
          APP_NAME="${{ github.event.inputs.app_name }}"
          WEB_URL="${{ github.event.inputs.web_url }}"
          
          cat > webapp/lib/main.dart << EOF
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '$APP_NAME',
                theme: ThemeData(useMaterial3: true),
                home: const WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;

            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..loadRequest(Uri.parse('$WEB_URL'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text('$APP_NAME')),
                body: WebViewWidget(controller: controller),
              );
            }
          }
          EOF
          
          echo "✅ main.dart generated"

      # ═══════════════════════════════════════════════════════════════════
      # 9. UPDATE PUBSPEC.YAML (SEDERHANA)
      # ═══════════════════════════════════════════════════════════════════
      - name: 📝 Update pubspec.yaml
        run: |
          echo "📝 Updating pubspec.yaml..."
          
          cd webapp
          
          # Backup
          cp pubspec.yaml pubspec.yaml.bak
          
          # Update nama package
          APP_NAME="${{ github.event.inputs.app_name }}"
          PACKAGE_NAME=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]/_/g' | sed 's/_\+/_/g' | sed 's/^_//;s/_$//')
          sed -i "s/^name:.*/name: $PACKAGE_NAME/g" pubspec.yaml
          
          # Hapus semua bagian flutter yang sudah ada
          sed -i '/^flutter:/,/^[^ ]/d' pubspec.yaml
          
          # Tambahkan flutter section
          cat >> pubspec.yaml << 'EOF'
          
          flutter:
            uses-material-design: true
            assets:
              - assets/icon.png
          EOF
          
          echo "✅ pubspec.yaml updated"

      # ═══════════════════════════════════════════════════════════════════
      # 10. FLUTTER CLEAN & PUB GET
      # ═══════════════════════════════════════════════════════════════════
      - name: 🧹 Flutter Clean
        working-directory: ./webapp
        run: flutter clean || true

      - name: 📦 Flutter Pub Get
        working-directory: ./webapp
        run: |
          echo "📦 Running flutter pub get..."
          flutter pub get
          
          if [ $? -ne 0 ]; then
            echo "❌ flutter pub get failed!"
            exit 1
          fi
          
          echo "✅ Dependencies installed"

      # ═══════════════════════════════════════════════════════════════════
      # 11. BUILD APK (HANYA RELEASE)
      # ═══════════════════════════════════════════════════════════════════
      - name: 🔨 Build APK
        working-directory: ./webapp
        run: |
          echo "🔨 Building APK..."
          
          # Build release langsung
          flutter build apk --release
          
          if [ $? -ne 0 ]; then
            echo "❌ Build failed!"
            exit 1
          fi
          
          echo "✅ Build completed!"

      # ═══════════════════════════════════════════════════════════════════
      # 12. COLLECT APK
      # ═══════════════════════════════════════════════════════════════════
      - name: 📦 Collect APK
        run: |
          echo "📦 Collecting APK..."
          mkdir -p apk_output
          
          # Cari APK
          find webapp/build -name "*.apk" -exec cp {} apk_output/ \; 2>/dev/null || true
          
          # Jika tidak ditemukan, cek path standar
          if [ -z "$(ls -A apk_output 2>/dev/null)" ]; then
            if [ -f "webapp/build/app/outputs/flutter-apk/app-release.apk" ]; then
              cp webapp/build/app/outputs/flutter-apk/app-release.apk apk_output/
            fi
          fi
          
          echo "📦 APK files:"
          ls -la apk_output/ || echo "No APK found"

      # ═══════════════════════════════════════════════════════════════════
      # 13. UPLOAD APK
      # ═══════════════════════════════════════════════════════════════════
      - name: ⬆️ Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-apk
          path: apk_output/
          retention-days: 7
          if-no-files-found: warn

      # ═══════════════════════════════════════════════════════════════════
      # 14. NOTIFY
      # ═══════════════════════════════════════════════════════════════════
      - name: ✅ Build Success
        if: success()
        run: |
          echo "🎉 WEB TO APK SUCCESS!"
          echo "📱 App: ${{ github.event.inputs.app_name }}"
          echo "🌐 URL: ${{ github.event.inputs.web_url }}"

      - name: ❌ Build Failed
        if: failure()
        run: |
          echo "❌ WEB TO APK FAILED!"
          echo "📋 Check logs above"