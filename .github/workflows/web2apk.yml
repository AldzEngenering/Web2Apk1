name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 35
    
    steps:
      # ==================== CHECKOUT ====================
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # ==================== SETUP JAVA ====================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      # ==================== SETUP FLUTTER ====================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true
          
      - name: Check Flutter Version
        run: flutter --version
        
      # ==================== CREATE FLUTTER PROJECT ====================
      - name: Create Flutter WebView Project
        id: project_setup
        run: |
          echo "📁 Creating Flutter project: ${{ github.event.inputs.app_name }}"
          
          # Create clean project with proper naming
          PROJECT_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]//g')
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_OUTPUT
          
          flutter create \
            --org com.web2apk \
            --project-name "$PROJECT_NAME" \
            --platforms android \
            "$PROJECT_NAME"
          
          cd "$PROJECT_NAME"
          
      # ─── 4. VALIDASI URL ──────────────────────────────────────────
      - name: 🔍 Validasi URL
        run: |
          URL="${{ github.event.inputs.web_url }}"
          if [[ ! "$URL" =~ ^https?:// ]]; then
            echo "❌ URL tidak valid: $URL"
            exit 1
          fi
          echo "✅ URL valid: $URL"

      # ─── 5. DOWNLOAD & VALIDASI ICON ─────────────────────────────
      - name: 🖼️ Download & validasi icon
        run: |
          ICON_URL="${{ github.event.inputs.icon_url }}"
          echo "📥 Download icon dari: $ICON_URL"
          
          curl -L -o icon_raw.png "$ICON_URL" -H "User-Agent: Mozilla/5.0"
          
          if [ ! -f icon_raw.png ]; then
            echo "❌ Gagal download icon, membuat icon default..."
            sudo apt-get update -qq
            sudo apt-get install -yqq imagemagick
            convert -size 512x512 xc:#2196F3 -fill white -gravity center -font Helvetica -pointsize 80 \
              -annotate 0 "WEB" icon_work.png
          else
            sudo apt-get update -qq
            sudo apt-get install -yqq imagemagick file
            file icon_raw.png
            
            if convert icon_raw.png -resize 512x512 icon_test.png 2>/dev/null; then
              cp icon_raw.png icon_work.png
            elif convert icon_raw.jpg -resize 512x512 icon_test.png 2>/dev/null; then
              cp icon_raw.jpg icon_work.png
            else
              echo "⚠️ Gagal konversi icon, membuat default..."
              convert -size 512x512 xc:#4CAF50 -fill white -gravity center -font Helvetica -pointsize 80 \
                -annotate 0 "APP" icon_work.png
            fi
          fi
          
          if [ ! -f icon_work.png ] || [ ! -s icon_work.png ]; then
            echo "⚠️ Icon corrupt, membuat default..."
            convert -size 512x512 xc:#2196F3 -fill white -gravity center -font Helvetica -pointsize 80 \
              -annotate 0 "WEB" icon_work.png
          fi
          
          echo "✅ Icon siap digunakan"
          file icon_work.png

      # ─── 6. RESIZE ICON ───────────────────────────────────────────
      - name: 🖼️ Resize icon
        run: |
          mkdir -p app/src/main/res
          
          for size in 48 72 96 144 192 512; do
            mkdir -p app/src/main/res/mipmap-${size}dpi
            convert icon_work.png -resize ${size}x${size} -background transparent -gravity center \
              -extent ${size}x${size} app/src/main/res/mipmap-${size}dpi/ic_launcher.png
            cp app/src/main/res/mipmap-${size}dpi/ic_launcher.png \
               app/src/main/res/mipmap-${size}dpi/ic_launcher_round.png
          done
          
          mkdir -p app/src/main/res/drawable
          cp app/src/main/res/mipmap-192dpi/ic_launcher.png app/src/main/res/drawable/ic_launcher.png
          
          echo "✅ Icon selesai diresize"
          # ==================== UPDATE PUBSPEC ====================
          cat > pubspec.yaml << EOF
          name: $PROJECT_NAME
          description: Web to APK app
          version: 1.0.0+1
          
          environment:
            sdk: ">=3.0.0 <4.0.0"
          
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.0
            url_launcher: ^6.3.0
            connectivity_plus: ^6.0.0
            permission_handler: ^11.0.0
            flutter_native_splash: ^2.4.0
            
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
            flutter_launcher_icons: ^0.13.0
            
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon/icon.png"
            min_sdk_android: 21
            
          flutter_native_splash:
            color: "#ffffff"
            image: assets/splash/splash.png
            android: true
            ios: false
            
          flutter:
            uses-material-design: true
            assets:
              - assets/icon/
              - assets/splash/
          EOF
          
          # ==================== CREATE ANDROID MANIFEST FIRST ====================
          # Kita buat manifest kustom terlebih dahulu agar siap diproses oleh generator ikon
          ESCAPED_APP_NAME=$(echo "${{ github.event.inputs.app_name }}" | sed 's/"/\\"/g')
          
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.web2apk.$PROJECT_NAME">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              
              <application
                  android:label="$ESCAPED_APP_NAME"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:allowBackup="true"
                  android:theme="@style/LaunchTheme">
                  
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                      
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # ==================== GENERATE ICONS & SPLASH ====================
          echo "🖼️ Generating app icons and splash..."
          flutter pub get
          flutter pub run flutter_launcher_icons:main -f pubspec.yaml
          flutter pub run flutter_native_splash:create --flavor android || echo "⚠️ Splash generation skipped"

          # ==================== CREATE MAIN.DART (SAFE ENVIRONMENT) ====================
          mkdir -p lib
          
          ESCAPED_URL=$(echo "${{ github.event.inputs.web_url }}" | sed 's/"/\\"/g')
          
          # Menggunakan 'EOF' dengan tanda petik tunggal agar karakter dolar ($) di dalam kode Dart tidak dianggap variabel Linux shell
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setEnabledSystemUIMode(SystemUiMode.immersiveSticky);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Web App',
                theme: ThemeData.dark(),
                home: const WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;
            bool isLoading = true;
            String errorMessage = '';

            @override
            void initState() {
              super.initState();
              _initWebView();
            }

            void _initWebView() {
              // Mengambil string URL yang disuntikkan secara dinamis saat runtime/build penggantian lewat sed
              final url = Uri.parse("URL_PLACEHOLDER");

              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0xFF000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageStarted: (String url) {
                      setState(() {
                        isLoading = true;
                        errorMessage = '';
                      });
                    },
                    onPageFinished: (String url) {
                      setState(() {
                        isLoading = false;
                      });
                    },
                    onWebResourceError: (WebResourceError error) {
                      setState(() {
                        isLoading = false;
                        errorMessage = 'Error: ${error.description}';
                      });
                    },
                  ),
                )
                ..loadRequest(url);
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                extendBodyBehindAppBar: true, 
                body: Stack(
                  children: [
                    WebViewWidget(controller: controller),
                    if (isLoading)
                      const Center(
                        child: CircularProgressIndicator(
                          color: Colors.blue,
                          strokeWidth: 3.0,
                        ),
                      ),
                    if (errorMessage.isNotEmpty)
                      Center(
                        child: Column(
                          mainAxisAlignment: MainAxisAlignment.center,
                          children: [
                            const Icon(Icons.error_outline, color: Colors.red, size: 48),
                            const SizedBox(height: 16),
                            const Text(
                              'Gagal Memuat Halaman',
                              style: TextStyle(
                                color: Colors.white,
                                fontSize: 18,
                                fontWeight: FontWeight.bold,
                              ),
                            ),
                            const SizedBox(height: 8),
                            Text(
                              errorMessage,
                              textAlign: TextAlign.center,
                              style: const TextStyle(color: Colors.grey, fontSize: 14),
                            ),
                            const SizedBox(height: 16),
                            ElevatedButton(
                              onPressed: () {
                                setState(() {
                                  errorMessage = '';
                                  isLoading = true;
                                });
                                controller.reload();
                              },
                              child: const Text('Coba Lagi'),
                            ),
                          ],
                        ),
                      ),
                  ],
                ),
              );
            }
          }
          EOF
          
          # Suntikkan URL asli dan nama aplikasi ke dalam main.dart secara aman tanpa merusak sintaks shell
          sed -i "s|URL_PLACEHOLDER|$ESCAPED_URL|g" lib/main.dart
          sed -i "s|Web App|$ESCAPED_APP_NAME|g" lib/main.dart
          
      # ==================== BUILD APK ====================
      - name: Build APK
        id: build
        run: |
          PROJECT_NAME="${{ steps.project_setup.outputs.PROJECT_NAME }}"
          cd "$PROJECT_NAME"
          flutter clean
          flutter pub get
          flutter build apk --release
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> $GITHUB_OUTPUT
            echo "✅ Build success!"
          else
            echo "❌ Build failed!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: webapp-apk
          path: ${{ steps.project_setup.outputs.PROJECT_NAME }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
