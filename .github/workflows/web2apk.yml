name: Web to APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL Website'
        required: true
      app_name:
        description: 'Nama Aplikasi'
        required: true
      icon_url:
        description: 'URL Icon (PNG)'
        required: true
      tag:
        description: 'Tag build'
        required: true

jobs:
  build-web2apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Enable Flutter Web
        run: |
          flutter config --enable-web
          flutter doctor -v

      - name: Create Flutter Web Project
        run: |
          echo "🌐 Creating Flutter web project for ${{ inputs.app_name }}..."
          flutter create --platforms=web web_app
          cd web_app

          # Download icon
          curl -L -o assets/icon.png "${{ inputs.icon_url }}"

          # Update pubspec.yaml
          sed -i "s/name: web_app/name: ${{ inputs.app_name }}/g" pubspec.yaml
          sed -i "s/^description:.*/description: ${{ inputs.app_name }} - Web to APK/g" pubspec.yaml

          # Tambahkan webview_flutter
          echo "" >> pubspec.yaml
          echo "dependencies:" >> pubspec.yaml
          echo "  flutter:" >> pubspec.yaml
          echo "    sdk: flutter" >> pubspec.yaml
          echo "  webview_flutter: ^4.7.0" >> pubspec.yaml
          echo "  webview_flutter_android: ^3.14.0" >> pubspec.yaml

          flutter pub get

      - name: Create WebView Wrapper
        working-directory: ./web_app
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:webview_flutter_android/webview_flutter_android.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ inputs.app_name }}',
                theme: ThemeData(primarySwatch: Colors.blue),
                debugShowCheckedModeBanner: false,
                home: const WebViewApp(),
              );
            }
          }

          class WebViewApp extends StatefulWidget {
            const WebViewApp({super.key});

            @override
            State<WebViewApp> createState() => _WebViewAppState();
          }

          class _WebViewAppState extends State<WebViewApp> {
            late final WebViewController _controller;

            @override
            void initState() {
              super.initState();
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0x00000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onProgress: (int progress) {
                      // Loading progress
                    },
                    onPageStarted: (String url) {},
                    onPageFinished: (String url) {},
                    onWebResourceError: (WebResourceError error) {},
                  ),
                )
                ..loadRequest(Uri.parse('${{ inputs.url }}'));

              if (WebViewPlatform.instance is AndroidWebViewController) {
                (WebViewPlatform.instance as AndroidWebViewController)
                    .setMediaPlaybackRequiresUserGesture(false);
              }
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text('${{ inputs.app_name }}'),
                  backgroundColor: Colors.blue,
                  foregroundColor: Colors.white,
                  actions: [
                    IconButton(
                      icon: const Icon(Icons.refresh),
                      onPressed: () => _controller.reload(),
                    ),
                  ],
                ),
                body: WebViewWidget(controller: _controller),
              );
            }
          }
          EOF

      - name: Build Android APK
        working-directory: ./web_app
        run: |
          echo "📱 Building Android APK..."
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web2apk
          path: web_app/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: Upload to Release
        if: always()
        run: |
          APK_FILE=$(find web_app/build/app/outputs -name "*.apk" | head -1)
          echo "✅ APK Path: $APK_FILE"
          echo "APK_PATH=$APK_FILE" >> $GITHUB_ENV

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.inputs.upload_url || 'https://uploads.github.com/repos/${{ github.repository }}/releases/${{ inputs.release_id }}/assets{?name,label}' }}
          asset_path: ${{ env.APK_PATH }}
          asset_name: ${{ inputs.app_name }}-web2apk.apk
          asset_content_type: application/vnd.android.package-archive
