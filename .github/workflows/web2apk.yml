name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 35
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true
          
      - name: Check Flutter Version
        run: flutter --version
        
      - name: Create Flutter WebView Project
        id: project_setup
        run: |
          echo "📁 Creating Flutter project: ${{ github.event.inputs.app_name }}"
          
          # Create clean project with proper naming
          PROJECT_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]//g')
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_OUTPUT
          
          flutter create \
            --org com.web2apk \
            --project-name "$PROJECT_NAME" \
            --platforms android \
            "$PROJECT_NAME"
          
          cd "$PROJECT_NAME"
          
          # ==================== DOWNLOAD AND CONVERT ICON ====================
          echo "🖼️ Downloading icon from: ${{ github.event.inputs.icon_url }}"
          mkdir -p assets/icon
          mkdir -p assets/splash
          
          # Install ImageMagick for image conversion
          sudo apt-get update
          sudo apt-get install -y imagemagick
          
          # Download icon with better error handling
          echo "🔗 Downloading icon..."
          DOWNLOAD_OK=false
          
          # Try to download with curl, following redirects and with proper user agent
          if curl -f -L --max-time 30 \
               -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               -o assets/icon/icon_downloaded \
               "${{ github.event.inputs.icon_url }}"; then
            
            echo "✅ HTTP download completed"
            
            # Check if file is empty
            if [ ! -s assets/icon/icon_downloaded ]; then
              echo "⚠️ Downloaded file is empty"
            else
              # Try to identify the file type
              FILE_TYPE=$(file -b --mime-type assets/icon/icon_downloaded 2>/dev/null || echo "unknown")
              echo "📁 File type: $FILE_TYPE"
              
              # Check if it's actually an image
              if [[ "$FILE_TYPE" == image/* ]]; then
                echo "✅ File is a valid image"
                DOWNLOAD_OK=true
              else
                echo "⚠️ File is not a recognized image type: $FILE_TYPE"
                echo "📄 First 200 bytes of file:"
                head -c 200 assets/icon/icon_downloaded | cat -v
                echo ""
                
                # Try to extract image from HTML/error page (fallback)
                echo "Attempting to extract image from HTML response..."
                grep -o 'https://[^"]*\.\(png\|jpg\|jpeg\|gif\|svg\)' assets/icon/icon_downloaded | head -1 > assets/icon/extracted_url.txt
                if [ -s assets/icon/extracted_url.txt ]; then
                  EXTRACTED_URL=$(cat assets/icon/extracted_url.txt)
                  echo "Found image URL in response: $EXTRACTED_URL"
                  curl -f -L --max-time 30 -o assets/icon/icon_downloaded "$EXTRACTED_URL" && DOWNLOAD_OK=true
                fi
              fi
            fi
          else
            echo "⚠️ Download failed for URL: ${{ github.event.inputs.icon_url }}"
          fi
          
          # Create icon if download failed or file is invalid
          if [ "$DOWNLOAD_OK" != true ]; then
            echo "⚠️ Using default icon (download failed or file invalid)"
            # Create a simple default icon
            convert -size 512x512 xc:blue -fill white -gravity center -pointsize 80 -draw "text 0,0 'APP'" assets/icon/icon.png
          else
            # Try to convert downloaded image to PNG
            if ! convert assets/icon/icon_downloaded -resize 512x512 -background white -flatten assets/icon/icon.png 2>/dev/null; then
              if ! convert assets/icon/icon_downloaded -resize 512x512 assets/icon/icon.png 2>/dev/null; then
                echo "⚠️ Icon conversion failed, creating default icon"
                convert -size 512x512 xc:blue -fill white -gravity center -pointsize 80 -draw "text 0,0 'APP'" assets/icon/icon.png
              fi
            fi
          fi
          
          # Verify PNG was created
          if [ ! -f assets/icon/icon.png ] || [ ! -s assets/icon/icon.png ]; then
            echo "⚠️ No valid icon found, creating default icon"
            convert -size 512x512 xc:blue -fill white -gravity center -pointsize 80 -draw "text 0,0 'APP'" assets/icon/icon.png
          fi
          
          # Verify PNG is valid
          if ! identify assets/icon/icon.png > /dev/null 2>&1; then
            echo "⚠️ Invalid PNG file, recreating default icon"
            convert -size 512x512 xc:blue -fill white -gravity center -pointsize 80 -draw "text 0,0 'APP'" assets/icon/icon.png
          fi
          
          # Copy icon as splash
          cp assets/icon/icon.png assets/splash/splash.png
          
          echo "✅ Icon prepared:"
          ls -la assets/icon/
          identify assets/icon/icon.png || echo "⚠️ Cannot identify icon file"
          
          # ==================== UPDATE PUBSPEC ====================
          cat > pubspec.yaml << EOF
          name: $PROJECT_NAME
          description: Web to APK app
          version: 1.0.0+1
          
          environment:
            sdk: ">=3.0.0 <4.0.0"
          
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.0
            url_launcher: ^6.3.0
            connectivity_plus: ^6.0.0
            permission_handler: ^11.0.0
            flutter_native_splash: ^2.4.0
            
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
            flutter_launcher_icons: ^0.13.0
            
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon/icon.png"
            min_sdk_android: 21
            
          flutter_native_splash:
            color: "#ffffff"
            image: assets/splash/splash.png
            android: true
            ios: false
            
          flutter:
            uses-material-design: true
            assets:
              - assets/icon/
              - assets/splash/
          EOF
          
          # ==================== CREATE ANDROID MANIFEST ====================
          ESCAPED_APP_NAME=$(echo "${{ github.event.inputs.app_name }}" | sed 's/"/\\"/g')
          
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.web2apk.$PROJECT_NAME">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              
              <application
                  android:label="$ESCAPED_APP_NAME"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:allowBackup="true"
                  android:theme="@style/LaunchTheme">
                  
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                      
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # ==================== GENERATE ICONS & SPLASH ====================
          echo "🖼️ Generating app icons and splash..."
          flutter pub get
          flutter pub run flutter_launcher_icons:main -f pubspec.yaml || echo "⚠️ Icon generation skipped"
          flutter pub run flutter_native_splash:create --flavor android || echo "⚠️ Splash generation skipped"

          # ==================== CREATE MAIN.DART ====================
          mkdir -p lib
          
          ESCAPED_URL=$(echo "${{ github.event.inputs.web_url }}" | sed 's/"/\\"/g')
          
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setEnabledSystemUIMode(SystemUiMode.immersiveSticky);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Web App',
                theme: ThemeData.dark(),
                home: const WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;
            bool isLoading = true;
            String errorMessage = '';

            @override
            void initState() {
              super.initState();
              _initWebView();
            }

            void _initWebView() {
              final url = Uri.parse("URL_PLACEHOLDER");

              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0xFF000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageStarted: (String url) {
                      setState(() {
                        isLoading = true;
                        errorMessage = '';
                      });
                    },
                    onPageFinished: (String url) {
                      setState(() {
                        isLoading = false;
                      });
                    },
                    onWebResourceError: (WebResourceError error) {
                      setState(() {
                        isLoading = false;
                        errorMessage = 'Error: ${error.description}';
                      });
                    },
                  ),
                )
                ..loadRequest(url);
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                extendBodyBehindAppBar: true, 
                body: Stack(
                  children: [
                    WebViewWidget(controller: controller),
                    if (isLoading)
                      const Center(
                        child: CircularProgressIndicator(
                          color: Colors.blue,
                          strokeWidth: 3.0,
                        ),
                      ),
                    if (errorMessage.isNotEmpty)
                      Center(
                        child: Column(
                          mainAxisAlignment: MainAxisAlignment.center,
                          children: [
                            const Icon(Icons.error_outline, color: Colors.red, size: 48),
                            const SizedBox(height: 16),
                            const Text(
                              'Gagal Memuat Halaman',
                              style: TextStyle(
                                color: Colors.white,
                                fontSize: 18,
                                fontWeight: FontWeight.bold,
                              ),
                            ),
                            const SizedBox(height: 8),
                            Text(
                              errorMessage,
                              textAlign: TextAlign.center,
                              style: const TextStyle(color: Colors.grey, fontSize: 14),
                            ),
                            const SizedBox(height: 16),
                            ElevatedButton(
                              onPressed: () {
                                setState(() {
                                  errorMessage = '';
                                  isLoading = true;
                                });
                                controller.reload();
                              },
                              child: const Text('Coba Lagi'),
                            ),
                          ],
                        ),
                      ),
                  ],
                ),
              );
            }
          }
          EOF
          
          # Suntikkan URL asli dan nama aplikasi ke dalam main.dart
          sed -i "s|URL_PLACEHOLDER|$ESCAPED_URL|g" lib/main.dart
          sed -i "s|Web App|$ESCAPED_APP_NAME|g" lib/main.dart
          
      - name: Build APK
        id: build
        run: |
          PROJECT_NAME="${{ steps.project_setup.outputs.PROJECT_NAME }}"
          cd "$PROJECT_NAME"
          flutter clean
          flutter pub get
          flutter build apk --release
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> $GITHUB_OUTPUT
            echo "✅ Build success!"
          else
            echo "❌ Build failed!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: webapp-apk
          path: ${{ steps.project_setup.outputs.PROJECT_NAME }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
