name: 🌐 Web to APK (Native WebView)

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: '🌍 URL Website'
        required: true
        type: string
      app_name:
        description: '📱 Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: '🖼️ URL Icon (PNG/JPG, 512x512 min)'
        required: true
        type: string

env:
  GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m'

jobs:
  build:
    name: 🚀 Build WebView APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: read

    steps:
      # ─── 1. CHECKOUT ──────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── 2. SETUP JAVA 17 ─────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ─── 3. VERIFIKASI JAVA ───────────────────────────────────────
      - name: 🔍 Verifikasi Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      # ─── 4. SETUP ANDROID SDK ──────────────────────────────────────
      - name: 🤖 Setup Android SDK
        run: |
          export JAVA_HOME=$JAVA_HOME
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          
          export ANDROID_SDK_ROOT=/usr/local/android-sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          
          sudo mkdir -p $ANDROID_SDK_ROOT
          sudo chown -R $USER:$USER $ANDROID_SDK_ROOT
          
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT
          mv $ANDROID_SDK_ROOT/cmdline-tools $ANDROID_SDK_ROOT/latest
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/latest $ANDROID_SDK_ROOT/cmdline-tools/
          
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          echo "PATH=$PATH" >> $GITHUB_ENV
          
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          
          echo "✅ Android SDK selesai diinstall"

      # ─── 5. VALIDASI URL ──────────────────────────────────────────
      - name: 🔍 Validasi URL
        run: |
          URL="${{ github.event.inputs.web_url }}"
          if [[ ! "$URL" =~ ^https?:// ]]; then
            echo "❌ URL tidak valid: $URL"
            exit 1
          fi
          echo "✅ URL valid: $URL"
          curl -I -s "$URL" | head -5 || true

      # ─── 6. DOWNLOAD & VALIDASI ICON ─────────────────────────────
      - name: 🖼️ Download & validasi icon
        run: |
          ICON_URL="${{ github.event.inputs.icon_url }}"
          echo "📥 Download icon dari: $ICON_URL"
          
          # Download dengan user agent
          curl -L -o icon_raw.png "$ICON_URL" -H "User-Agent: Mozilla/5.0"
          
          # Cek apakah file berhasil didownload
          if [ ! -f icon_raw.png ]; then
            echo "❌ Gagal download icon, membuat icon default..."
            echo "create default icon" > /tmp/fallback
            exit 0
          fi
          
          # Cek ukuran file
          FILE_SIZE=$(stat -c%s icon_raw.png)
          echo "📏 Ukuran file: $FILE_SIZE bytes"
          
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "⚠️ File terlalu kecil (< 100 bytes), mungkin bukan gambar!"
            echo "Membuat icon default..."
            exit 0
          fi
          
          # Install tools
          sudo apt-get update -qq
          sudo apt-get install -yqq imagemagick file
          
          # Cek tipe file
          file icon_raw.png
          
          # Coba konversi dengan berbagai format
          echo "🔄 Mencoba konversi icon..."
          
          # Coba sebagai PNG
          if convert icon_raw.png -resize 512x512 icon_test.png 2>/dev/null; then
            echo "✅ Icon berhasil dikonversi sebagai PNG"
            cp icon_raw.png icon_work.png
          # Coba sebagai JPG
          elif convert icon_raw.jpg -resize 512x512 icon_test.png 2>/dev/null; then
            echo "✅ Icon berhasil dikonversi sebagai JPG"
            cp icon_raw.jpg icon_work.png
          # Coba sebagai WEBP
          elif convert icon_raw.webp -resize 512x512 icon_test.png 2>/dev/null; then
            echo "✅ Icon berhasil dikonversi sebagai WEBP"
            cp icon_raw.webp icon_work.png
          else
            echo "⚠️ Gagal konversi icon, membuat icon default..."
            # Buat icon default kotak hijau
            convert -size 512x512 xc:#4CAF50 -fill white -gravity center -font Helvetica -pointsize 80 \
              -annotate 0 "APP" icon_work.png 2>/dev/null || echo "Gagal buat icon default"
          fi
          
          # Jika icon_work tidak ada atau corrupt, buat default
          if [ ! -f icon_work.png ] || [ ! -s icon_work.png ]; then
            echo "⚠️ Icon corrupt, membuat icon default..."
            convert -size 512x512 xc:#2196F3 -fill white -gravity center -font Helvetica -pointsize 80 \
              -annotate 0 "WEB" icon_work.png 2>/dev/null || true
          fi
          
          # Verifikasi final icon
          if [ -f icon_work.png ] && [ -s icon_work.png ]; then
            echo "✅ Icon siap digunakan"
            file icon_work.png
            ls -lh icon_work.png
          else
            echo "❌ Gagal membuat icon, exit"
            exit 1
          fi

      # ─── 7. RESIZE ICON ───────────────────────────────────────────
      - name: 🖼️ Resize icon untuk semua resolusi
        run: |
          # Buat folder resources
          mkdir -p app/src/main/res
          
          # Resize ke berbagai ukuran
          for size in 48 72 96 144 192 512; do
            mkdir -p app/src/main/res/mipmap-${size}dpi
            convert icon_work.png -resize ${size}x${size} -background transparent -gravity center \
              -extent ${size}x${size} app/src/main/res/mipmap-${size}dpi/ic_launcher.png
            cp app/src/main/res/mipmap-${size}dpi/ic_launcher.png \
               app/src/main/res/mipmap-${size}dpi/ic_launcher_round.png
            echo "✅ ${size}dpi selesai"
          done
          
          mkdir -p app/src/main/res/drawable
          cp app/src/main/res/mipmap-192dpi/ic_launcher.png app/src/main/res/drawable/ic_launcher.png
          
          echo "✅ Semua icon selesai diresize"
          ls -la app/src/main/res/

      # ─── 8. BUAT PROJECT ANDROID NATIVE ──────────────────────────
      - name: 📦 Generate Android WebView Project
        run: |
          WEB_URL="${{ github.event.inputs.web_url }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          
          # Buat package name
          PKG=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g' | sed 's/__*/_/g' | sed 's/^_//' | sed 's/_$//')
          [ -z "$PKG" ] && PKG="webapp"
          PKG="com.web2apk.$PKG"
          
          echo "PKG=$PKG" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          
          # Buat struktur folder
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          
          # ─── AndroidManifest.xml ──────────────────────────────────
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="PKG_PLACEHOLDER">
          
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
          
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="APP_NAME_PLACEHOLDER"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden|keyboard">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          sed -i "s/PKG_PLACEHOLDER/$PKG/g" app/src/main/AndroidManifest.xml
          sed -i "s/APP_NAME_PLACEHOLDER/$APP_NAME/g" app/src/main/AndroidManifest.xml
          
          # ─── MainActivity.java ────────────────────────────────────
          cat > app/src/main/java/$PKG_PATH/MainActivity.java << 'EOF'
          package PKG_PLACEHOLDER;
          
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.view.View;
          import android.view.WindowManager;
          import androidx.appcompat.app.AppCompatActivity;
          
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
          
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,
                          WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  setContentView(R.layout.activity_main);
          
                  webView = findViewById(R.id.webView);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setLoadWithOverviewMode(true);
                  webSettings.setUseWideViewPort(true);
                  webSettings.setBuiltInZoomControls(true);
                  webSettings.setDisplayZoomControls(false);
                  webSettings.setSupportZoom(true);
                  webSettings.setDefaultTextEncodingName("utf-8");
                  webSettings.setCacheMode(WebSettings.LOAD_DEFAULT);
          
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          view.loadUrl(url);
                          return true;
                      }
                  });
          
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.loadUrl("WEB_URL_PLACEHOLDER");
              }
          
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF
          
          sed -i "s/PKG_PLACEHOLDER/$PKG/g" app/src/main/java/$PKG_PATH/MainActivity.java
          sed -i "s|WEB_URL_PLACEHOLDER|$WEB_URL|g" app/src/main/java/$PKG_PATH/MainActivity.java
          
          # ─── activity_main.xml ────────────────────────────────────
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical">
          
              <WebView
                  android:id="@+id/webView"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
          
          </LinearLayout>
          EOF
          
          # ─── styles.xml ────────────────────────────────────────────
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.AppCompat.Light">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowBackground">@android:color/white</item>
              </style>
          </resources>
          EOF
          
          # ─── build.gradle (app level) ─────────────────────────────
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              namespace 'PKG_PLACEHOLDER'
              compileSdk 34
          
              defaultConfig {
                  applicationId 'PKG_PLACEHOLDER'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0.0'
              }
          
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      minifyEnabled false
                      debuggable true
                  }
              }
          
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
          }
          EOF
          
          sed -i "s/PKG_PLACEHOLDER/$PKG/g" app/build.gradle
          
          # ─── proguard-rules.pro ────────────────────────────────────
          cat > app/proguard-rules.pro << 'EOF'
          -keep class android.webkit.** { *; }
          -keep class androidx.appcompat.** { *; }
          -keepattributes *Annotation*
          -keepattributes SourceFile,LineNumberTable
          -dontwarn android.webkit.**
          -dontwarn androidx.**
          EOF
          
          # ─── build.gradle (root) ──────────────────────────────────
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          # ─── settings.gradle ──────────────────────────────────────
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'WebViewApp'
          include ':app'
          EOF
          
          # ─── gradle.properties ─────────────────────────────────────
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4g
          android.enableJetifier=true
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF
          
          echo "✅ Project Android WebView berhasil dibuat"
          echo "📦 Package: $PKG"
          echo "📱 App Name: $APP_NAME"

      # ─── 9. SETUP GRADLE WRAPPER ──────────────────────────────────
      - name: 🔧 Setup Gradle Wrapper
        run: |
          export JAVA_HOME=$JAVA_HOME
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      # ─── 10. BUILD APK ─────────────────────────────────────────────
      - name: 🔨 Build APK
        run: |
          export JAVA_HOME=$JAVA_HOME
          export PATH=$JAVA_HOME/bin:$PATH
          export ANDROID_SDK_ROOT=/usr/local/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          java -version
          echo "📦 Building APK..."
          ./gradlew assembleRelease --no-daemon --stacktrace
          echo "✅ Build selesai"

      # ─── 11. FIND APK ─────────────────────────────────────────────
      - name: 🔍 Find APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK tidak ditemukan!"
            find app/build -name "*.apk" 2>/dev/null || echo "Tidak ada APK"
            exit 1
          fi
          echo "✅ APK ditemukan: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          ls -lh $APK_PATH

      # ─── 12. UPLOAD ARTIFACT ──────────────────────────────────────
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: webview-apk-${{ github.event.inputs.app_name }}
          path: ${{ env.APK_PATH }}
          retention-days: 7
          compression-level: 0

      # ─── 13. UPLOAD KE RELEASE ────────────────────────────────────
      - name: 📤 Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: webview-${{ github.event.inputs.app_name }}-${{ github.run_number }}
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── 14. SUMMARY ──────────────────────────────────────────────
      - name: 📊 Build Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ WEBVIEW APK BUILD SUCCESS!"
          echo "🌍 URL: ${{ github.event.inputs.web_url }}"
          echo "📱 App: ${{ github.event.inputs.app_name }}"
          echo "📦 Package: ${{ env.PKG }}"
          echo "📁 APK: ${{ env.APK_PATH }}"
          APK_SIZE=$(du -h ${{ env.APK_PATH }} | cut -f1)
          echo "📏 Size: $APK_SIZE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ─── 15. NOTIFICATION ─────────────────────────────────────────
      - name: 🔔 Completion notification
        if: always()
        run: |
          echo "✅ Build selesai dengan status: ${{ job.status }}"
