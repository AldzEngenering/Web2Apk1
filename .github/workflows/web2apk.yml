name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon - PASTI BISA DIAKSES PUBLIC!'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget curl imagemagick

      - name: Install Android SDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p $ANDROID_HOME/cmdline-tools
          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          echo y | sdkmanager --licenses --no_https > /dev/null 2>&1 || true
          echo y | sdkmanager "build-tools;34.0.0" --no_https > /dev/null 2>&1 || true
          echo y | sdkmanager "platforms;android-34" --no_https > /dev/null 2>&1 || true

      - name: Create Flutter project
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          PKG=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g' | sed 's/__*/_/g' | sed 's/^_//' | sed 's/_$//')
          [ -z "$PKG" ] && PKG="webapp"
          flutter create --org com.app --project-name "$PKG" webapp
          echo "PKG=$PKG" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

      - name: Fix gradle wrapper
        run: |
          cd webapp
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip
          EOF
          cd gradle/wrapper
          wget -q https://raw.githubusercontent.com/gradle/gradle/v7.5.0/gradle/wrapper/gradle-wrapper.jar
          cd ../..

      - name: Fix gradle
        run: |
          cd webapp
          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.1.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF
          PKG="${{ env.PKG }}"
          cat > android/app/build.gradle << 'EOF'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }
          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) {
              throw new GradleException("Flutter SDK not found.")
          }
          def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
          if (flutterVersionCode == null) {
              flutterVersionCode = '1'
          }
          def flutterVersionName = localProperties.getProperty('flutter.versionName')
          if (flutterVersionName == null) {
              flutterVersionName = '1.0'
          }
          apply plugin: 'com.android.application'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          android {
              namespace "com.app.PKG_PLACEHOLDER"
              compileSdk 34
              ndkVersion flutter.ndkVersion
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
              defaultConfig {
                  applicationId "com.app.PKG_PLACEHOLDER"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          flutter {
              source '../..'
          }
          EOF
          sed -i "s/PKG_PLACEHOLDER/$PKG/g" android/app/build.gradle

      - name: Add webview
        run: |
          cd webapp
          sed -i '/^dependencies:/a\  webview_flutter: ^4.4.2' pubspec.yaml
          flutter pub get

      - name: Fix manifest
        run: |
          cd webapp
          APP_NAME="${{ env.APP_NAME }}"
          sed -i 's/android:label="[^"]*"//g' android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<application android:label="'"$APP_NAME"'"|g' android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<application android:usesCleartextTraffic="true"|g' android/app/src/main/AndroidManifest.xml
          if ! grep -q "INTERNET" android/app/src/main/AndroidManifest.xml; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          fi

      # ─── ICON ──────────────────────────────────────────
      - name: Setup icon
        run: |
          ICON_URL="${{ github.event.inputs.icon_url }}"
          mkdir -p webapp/android/app/src/main/res/mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}
          
          echo "🖼️ Downloading icon from: $ICON_URL"
          
          # Coba download dengan berbagai header
          curl -L -o icon.png \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: image/webp,image/apng,image/*,*/*;q=0.8" \
            --max-time 30 \
            "$ICON_URL" || echo "⚠️ Download failed"
          
          # Jika gagal, buat default
          if [ ! -f icon.png ] || [ ! -s icon.png ] || ! file icon.png | grep -qi "image"; then
            echo "⚠️ Icon invalid, creating default..."
            APP_NAME="${{ env.APP_NAME }}"
            convert -size 512x512 gradient:blue-darkblue \
              -fill white -gravity center \
              -font DejaVu-Sans -pointsize 100 \
              -draw "text 0,-10 '$(echo $APP_NAME | cut -c1-2 | tr '[:lower:]' '[:upper:]')'" \
              -gravity south -pointsize 30 \
              -draw "text 0,40 '$APP_NAME'" \
              icon.png
          fi
          
          # Resize
          convert icon.png -resize 48x48 webapp/android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon.png -resize 72x72 webapp/android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon.png -resize 96x96 webapp/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon.png -resize 144x144 webapp/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon.png -resize 192x192 webapp/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          echo "✅ Icon ready!"

      # ─── MAIN.DART ─────────────────────────────────────
      - name: Generate main.dart
        run: |
          APP_NAME="${{ env.APP_NAME }}"
          WEB_URL="${{ github.event.inputs.web_url }}"
          
          cat > webapp/lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          
          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(MyApp());
          }
          
          class MyApp extends StatelessWidget {
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'APP_NAME_PLACEHOLDER',
                theme: ThemeData(
                  primarySwatch: Colors.blue,
                  useMaterial3: true,
                ),
                home: WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }
          
          class WebViewScreen extends StatefulWidget {
            @override
            _WebViewScreenState createState() => _WebViewScreenState();
          }
          
          class _WebViewScreenState extends State<WebViewScreen> {
            late WebViewController controller;
            bool isLoading = true;
            bool hasError = false;
            String errorMessage = '';
          
            @override
            void initState() {
              super.initState();
              
              String url = 'WEB_URL_PLACEHOLDER';
              if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://$url';
              }
              
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0x00000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onProgress: (int progress) {},
                    onPageStarted: (String url) {
                      setState(() {
                        isLoading = true;
                        hasError = false;
                      });
                    },
                    onPageFinished: (String url) {
                      setState(() {
                        isLoading = false;
                      });
                    },
                    onWebResourceError: (WebResourceError error) {
                      setState(() {
                        isLoading = false;
                        hasError = true;
                        errorMessage = error.description;
                      });
                    },
                    onHttpError: (HttpResponseError error) {
                      setState(() {
                        isLoading = false;
                        hasError = true;
                        errorMessage = 'HTTP Error: ${error.response?.statusCode ?? 'Unknown'}';
                      });
                    },
                  ),
                )
                ..loadRequest(Uri.parse(url));
            }
          
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text(
                    'APP_NAME_PLACEHOLDER',
                    style: TextStyle(fontWeight: FontWeight.bold),
                  ),
                  centerTitle: true,
                  backgroundColor: Colors.blue,
                  foregroundColor: Colors.white,
                  elevation: 0,
                ),
                body: Stack(
                  children: [
                    WebViewWidget(controller: controller),
                    if (isLoading)
                      Container(
                        color: Colors.white,
                        child: Center(
                          child: Column(
                            mainAxisAlignment: MainAxisAlignment.center,
                            children: [
                              SizedBox(
                                width: 50,
                                height: 50,
                                child: CircularProgressIndicator(
                                  color: Colors.blue,
                                  strokeWidth: 4,
                                ),
                              ),
                              SizedBox(height: 20),
                              Text(
                                'Memuat...',
                                style: TextStyle(
                                  fontSize: 16,
                                  color: Colors.grey[600],
                                ),
                              ),
                            ],
                          ),
                        ),
                      ),
                    if (hasError)
                      Container(
                        color: Colors.white,
                        child: Center(
                          child: Padding(
                            padding: EdgeInsets.all(20),
                            child: Column(
                              mainAxisAlignment: MainAxisAlignment.center,
                              children: [
                                Icon(
                                  Icons.error_outline,
                                  size: 80,
                                  color: Colors.red[300],
                                ),
                                SizedBox(height: 20),
                                Text(
                                  'Gagal Memuat Halaman',
                                  style: TextStyle(
                                    fontSize: 22,
                                    fontWeight: FontWeight.bold,
                                  ),
                                ),
                                SizedBox(height: 10),
                                Text(
                                  errorMessage.isNotEmpty 
                                      ? errorMessage 
                                      : 'Periksa koneksi internet atau URL website',
                                  textAlign: TextAlign.center,
                                  style: TextStyle(
                                    fontSize: 14,
                                    color: Colors.grey[600],
                                  ),
                                ),
                                SizedBox(height: 30),
                                ElevatedButton.icon(
                                  onPressed: () {
                                    setState(() {
                                      hasError = false;
                                      isLoading = true;
                                      controller.reload();
                                    });
                                  },
                                  icon: Icon(Icons.refresh),
                                  label: Text('Coba Lagi'),
                                  style: ElevatedButton.styleFrom(
                                    backgroundColor: Colors.blue,
                                    foregroundColor: Colors.white,
                                    padding: EdgeInsets.symmetric(
                                      horizontal: 30,
                                      vertical: 12,
                                    ),
                                    shape: RoundedRectangleBorder(
                                      borderRadius: BorderRadius.circular(10),
                                    ),
                                  ),
                                ),
                              ],
                            ),
                          ),
                        ),
                      ),
                  ],
                ),
              );
            }
          }
          EOF
          
          sed -i "s|APP_NAME_PLACEHOLDER|$APP_NAME|g" webapp/lib/main.dart
          sed -i "s|WEB_URL_PLACEHOLDER|$WEB_URL|g" webapp/lib/main.dart

      - name: Build APK
        id: build
        run: |
          cd webapp
          flutter clean
          flutter build apk --release
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> $GITHUB_OUTPUT
            echo "✅ Build success!"
          else
            echo "❌ Build failed!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: webapp-apk
          path: webapp/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
