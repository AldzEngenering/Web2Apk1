name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 35
    
    steps:
      # ==================== CHECKOUT ====================
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # ==================== SETUP JAVA ====================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      # ==================== SETUP FLUTTER ====================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true
          
      - name: Check Flutter Version
        run: flutter --version
        
      # ==================== CREATE FLUTTER PROJECT ====================
      - name: Create Flutter WebView Project
        id: project_setup
        run: |
          echo "📁 Creating Flutter project: ${{ github.event.inputs.app_name }}"
          
          # Create clean project with proper naming
          PROJECT_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]//g')
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_OUTPUT
          
          flutter create \
            --org com.web2apk \
            --project-name "$PROJECT_NAME" \
            --platforms android \
            "$PROJECT_NAME"
          
          cd "$PROJECT_NAME"
          
          # ==================== DOWNLOAD AND CONVERT ICON FIRST ====================
          echo "🖼️ Downloading icon from: ${{ github.event.inputs.icon_url }}"
          mkdir -p assets/icon
          mkdir -p assets/splash
          
          # Install ImageMagick for image conversion
          sudo apt-get update
          sudo apt-get install -y imagemagick
          
          # Download icon with retry
          echo "Downloading icon..."
          if curl -L --max-time 30 -o assets/icon/icon_downloaded "${{ github.event.inputs.icon_url }}"; then
            echo "✅ Icon downloaded successfully"
            
            # Detect file type and convert to PNG
            file assets/icon/icon_downloaded
            
            # Try to convert to PNG (handles various formats)
            if convert assets/icon/icon_downloaded -resize 512x512 -background white -flatten assets/icon/icon.png 2>/dev/null; then
              echo "✅ Icon converted to PNG successfully"
            elif convert assets/icon/icon_downloaded -resize 512x512 assets/icon/icon.png 2>/dev/null; then
              echo "✅ Icon converted to PNG successfully (fallback method)"
            else
              echo "⚠️ Icon conversion failed, creating default icon"
              convert -size 512x512 xc:blue -fill white -gravity center -pointsize 80 -draw "text 0,0 'APP'" assets/icon/icon.png
            fi
          else
            echo "⚠️ Icon download failed, creating default icon"
            convert -size 512x512 xc:blue -fill white -gravity center -pointsize 80 -draw "text 0,0 'APP'" assets/icon/icon.png
          fi
          
          # Verify PNG was created
          if [ ! -f assets/icon/icon.png ] || [ ! -s assets/icon/icon.png ]; then
            echo "⚠️ No valid icon found, creating default icon"
            convert -size 512x512 xc:blue -fill white -gravity center -pointsize 80 -draw "text 0,0 'APP'" assets/icon/icon.png
          fi
          
          # Copy icon as splash
          cp assets/icon/icon.png assets/splash/splash.png
          
          echo "✅ Icon prepared:"
          ls -la assets/icon/
          ls -la assets/splash/
          
          # ==================== UPDATE PUBSPEC ====================
          cat > pubspec.yaml << EOF
          name: $PROJECT_NAME
          description: Web to APK app
          version: 1.0.0+1
          
          environment:
            sdk: ">=3.0.0 <4.0.0"
          
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.0
            url_launcher: ^6.3.0
            connectivity_plus: ^6.0.0
            permission_handler: ^11.0.0
            flutter_native_splash: ^2.4.0
            flutter_launcher_icons: ^0.13.0
            
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
            
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon/icon.png"
            min_sdk_android: 21
            adaptive_icon_background: "#ffffff"
            adaptive_icon_foreground: "assets/icon/icon.png"
            
          flutter_native_splash:
            color: "#ffffff"
            image: assets/splash/splash.png
            android: true
            ios: false
            
          flutter:
            uses-material-design: true
            assets:
              - assets/icon/
              - assets/splash/
          EOF
          
          # ==================== CREATE MAIN.DART ====================
          mkdir -p lib
          
          # Escape the URL for use in Dart code
          ESCAPED_URL=$(echo "${{ github.event.inputs.web_url }}" | sed 's/"/\\"/g')
          ESCAPED_APP_NAME=$(echo "${{ github.event.inputs.app_name }}" | sed 's/"/\\"/g')
          
          cat > lib/main.dart << EOF
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:url_launcher/url_launcher.dart';
          import 'package:connectivity_plus/connectivity_plus.dart';
          import 'package:permission_handler/permission_handler.dart';
          
          void main() {
            runApp(const MyApp());
          }
          
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '$ESCAPED_APP_NAME',
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue),
                  useMaterial3: true,
                ),
                home: const WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }
          
          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});
            
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }
          
          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController _controller;
            bool _isLoading = true;
            bool _hasError = false;
            String _errorMessage = '';
            String _currentUrl = '$ESCAPED_URL';
            
            @override
            void initState() {
              super.initState();
              _initializeWebView();
              _checkConnectivity();
              _requestPermissions();
            }
            
            Future<void> _checkConnectivity() async {
              final connectivityResult = await Connectivity().checkConnectivity();
              if (connectivityResult == ConnectivityResult.none) {
                setState(() {
                  _hasError = true;
                  _errorMessage = 'No internet connection';
                });
              }
            }
            
            Future<void> _requestPermissions() async {
              await [
                Permission.storage,
                Permission.camera,
                Permission.microphone,
              ].request();
            }
            
            void _initializeWebView() {
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0x00000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onProgress: (int progress) {
                      if (progress >= 100) {
                        setState(() {
                          _isLoading = false;
                        });
                      }
                    },
                    onPageStarted: (String url) {
                      setState(() {
                        _isLoading = true;
                        _hasError = false;
                        _currentUrl = url;
                      });
                    },
                    onPageFinished: (String url) {
                      setState(() {
                        _isLoading = false;
                        _currentUrl = url;
                      });
                    },
                    onWebResourceError: (WebResourceError error) {
                      setState(() {
                        _hasError = true;
                        _errorMessage = error.description ?? 'Error loading page';
                        _isLoading = false;
                      });
                    },
                    onNavigationRequest: (NavigationRequest request) {
                      if (request.url.startsWith('http')) {
                        return NavigationDecision.navigate;
                      }
                      return NavigationDecision.prevent;
                    },
                  ),
                )
                ..loadRequest(Uri.parse('$ESCAPED_URL'));
            }
            
            void _reloadPage() {
              setState(() {
                _hasError = false;
                _errorMessage = '';
                _isLoading = true;
              });
              _controller.loadRequest(Uri.parse(_currentUrl));
            }
            
            void _openInBrowser() async {
              final url = Uri.parse(_currentUrl);
              if (await canLaunchUrl(url)) {
                await launchUrl(url);
              }
            }
            
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: Stack(
                    children: [
                      WebViewWidget(controller: _controller),
                      if (_isLoading)
                        Container(
                          color: Colors.white,
                          child: const Center(
                            child: CircularProgressIndicator(),
                          ),
                        ),
                      if (_hasError)
                        Container(
                          color: Colors.white,
                          child: Center(
                            child: Column(
                              mainAxisAlignment: MainAxisAlignment.center,
                              children: [
                                const Icon(
                                  Icons.error_outline,
                                  size: 64,
                                  color: Colors.red,
                                ),
                                const SizedBox(height: 16),
                                Text(
                                  'Error',
                                  style: TextStyle(
                                    fontSize: 20,
                                    fontWeight: FontWeight.bold,
                                    color: Colors.grey[800],
                                  ),
                                ),
                                const SizedBox(height: 8),
                                Padding(
                                  padding: const EdgeInsets.symmetric(horizontal: 32),
                                  child: Text(
                                    _errorMessage,
                                    textAlign: TextAlign.center,
                                    style: TextStyle(
                                      color: Colors.grey[600],
                                    ),
                                  ),
                                ),
                                const SizedBox(height: 24),
                                ElevatedButton.icon(
                                  onPressed: _reloadPage,
                                  icon: const Icon(Icons.refresh),
                                  label: const Text('Refresh'),
                                ),
                              ],
                            ),
                          ),
                        ),
                    ],
                  ),
                ),
                bottomNavigationBar: Container(
                  height: 56,
                  decoration: BoxDecoration(
                    color: Colors.white,
                    boxShadow: [
                      BoxShadow(
                        color: Colors.grey.withOpacity(0.2),
                        blurRadius: 8,
                      ),
                    ],
                  ),
                  child: Row(
                    mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                    children: [
                      IconButton(
                        onPressed: () async {
                          if (await _controller.canGoBack()) {
                            _controller.goBack();
                          }
                        },
                        icon: const Icon(Icons.arrow_back_ios),
                      ),
                      IconButton(
                        onPressed: _reloadPage,
                        icon: const Icon(Icons.refresh),
                      ),
                      IconButton(
                        onPressed: () async {
                          if (await _controller.canGoForward()) {
                            _controller.goForward();
                          }
                        },
                        icon: const Icon(Icons.arrow_forward_ios),
                      ),
                      IconButton(
                        onPressed: _openInBrowser,
                        icon: const Icon(Icons.open_in_browser),
                      ),
                    ],
                  ),
                ),
              );
            }
          }
          EOF
          
          # ==================== CREATE ANDROID MANIFEST ====================
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.web2apk.$PROJECT_NAME">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              
              <application
                  android:label="$ESCAPED_APP_NAME"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:allowBackup="true"
                  android:theme="@style/LaunchTheme">
                  
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                      
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # ==================== GENERATE SPLASH ====================
          echo "🖼️ Generating splash screen..."
          flutter pub get
          flutter pub run flutter_native_splash:create --flavor android || echo "⚠️ Splash generation skipped"
          
          # ==================== GENERATE ICONS ====================
          echo "🖼️ Generating app icons..."
          flutter pub run flutter_launcher_icons:main -f pubspec.yaml || echo "⚠️ Icon generation skipped"
          
      # ==================== BUILD APK ====================
      - name: Build APK
        id: build
        run: |
          PROJECT_NAME="${{ steps.project_setup.outputs.PROJECT_NAME }}"
          cd "$PROJECT_NAME"
          flutter clean
          flutter pub get
          flutter build apk --release
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> $GITHUB_OUTPUT
            echo "✅ Build success!"
          else
            echo "❌ Build failed!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: webapp-apk
          path: ${{ steps.project_setup.outputs.PROJECT_NAME }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
